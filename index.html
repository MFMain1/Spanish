const CJ_VERBS = [
  {es:"hablar",en:"to speak",t:"ar",f:{present:["hablo","hablas","habla","hablamos","habláis","hablan"],preterite:["hablé","hablaste","habló","hablamos","hablasteis","hablaron"],imperfect:["hablaba","hablabas","hablaba","hablábamos","hablabais","hablaban"],future:["hablaré","hablarás","hablará","hablaremos","hablaréis","hablarán"]}},
  {es:"comer",en:"to eat",t:"er",f:{present:["como","comes","come","comemos","coméis","comen"],preterite:["comí","comiste","comió","comimos","comisteis","comieron"],imperfect:["comía","comías","comía","comíamos","comíais","comían"],future:["comeré","comerás","comerá","comeremos","comeréis","comerán"]}},
  {es:"vivir",en:"to live",t:"ir",f:{present:["vivo","vives","vive","vivimos","vivís","viven"],preterite:["viví","viviste","vivió","vivimos","vivisteis","vivieron"],imperfect:["vivía","vivías","vivía","vivíamos","vivíais","vivían"],future:["viviré","vivirás","vivirá","viviremos","viviréis","vivirán"]}},
  {es:"ser",en:"to be (perm.)",t:"irreg",f:{present:["soy","eres","es","somos","sois","son"],preterite:["fui","fuiste","fue","fuimos","fuisteis","fueron"],imperfect:["era","eras","era","éramos","erais","eran"],future:["seré","serás","será","seremos","seréis","serán"]}},
  {es:"estar",en:"to be (temp.)",t:"irreg",f:{present:["estoy","estás","está","estamos","estáis","están"],preterite:["estuve","estuviste","estuvo","estuvimos","estuvisteis","estuvieron"],imperfect:["estaba","estabas","estaba","estábamos","estabais","estaban"],future:["estaré","estarás","estará","estaremos","estaréis","estarán"]}},
  {es:"tener",en:"to have",t:"irreg",f:{present:["tengo","tienes","tiene","tenemos","tenéis","tienen"],preterite:["tuve","tuviste","tuvo","tuvimos","tuvisteis","tuvieron"],imperfect:["tenía","tenías","tenía","teníamos","teníais","tenían"],future:["tendré","tendrás","tendrá","tendremos","tendréis","tendrán"]}},
  {es:"ir",en:"to go",t:"irreg",f:{present:["voy","vas","va","vamos","vais","van"],preterite:["fui","fuiste","fue","fuimos","fuisteis","fueron"],imperfect:["iba","ibas","iba","íbamos","ibais","iban"],future:["iré","irás","irá","iremos","iréis","irán"]}},
  {es:"hacer",en:"to do/make",t:"irreg",f:{present:["hago","haces","hace","hacemos","hacéis","hacen"],preterite:["hice","hiciste","hizo","hicimos","hicisteis","hicieron"],imperfect:["hacía","hacías","hacía","hacíamos","hacíais","hacían"],future:["haré","harás","hará","haremos","haréis","harán"]}},
];
const TENSES = [{id:'present',label:'Present'},{id:'preterite',label:'Preterite'},{id:'imperfect',label:'Imperfect'},{id:'future',label:'Future'}];
const PRONOUNS = ['yo','tú','él/ella','nosotros','vosotros','ellos'];
let cjV=0, cjT='present';

function conjBuildUI() {
  const el = document.getElementById('conjScroll');
  el.innerHTML = `
  <div class="sec-label">Choose a Verb</div>
  <div class="verb-grid" id="verbGrid">${CJ_VERBS.map((v,i)=>`<button class="verb-btn ${i===0?'sel':''}" onclick="cjSelVerb(${i},this)"><div class="vb-es">${v.es}</div><div class="vb-en">${v.en}</div></button>`).join('')}</div>
  <div class="sec-label">Choose a Tense</div>
  <div class="tense-row" id="tenseRow">${TENSES.map(t=>`<button class="tense-btn ${t.id==='present'?'active':''}" onclick="cjSelTense('${t.id}',this)">${t.label}</button>`).join('')}</div>
  <div class="cj-area">
    <div class="cj-verb-hdr" id="cjVhdr">hablar</div>
    <div class="cj-verb-sub" id="cjVsub">to speak — present tense</div>
    <div class="cj-grid" id="cjGrid"></div>
    <div class="cj-result" id="cjResult"></div>
  </div>
  <div class="cj-btns">
    <button class="cj-check" onclick="cjCheck()">Check Answers</button>
    <button class="cj-reveal" onclick="cjReveal()">Reveal All</button>
  </div>
  <div class="cj-tip" id="cjTip"></div>`;
  cjRender();
}

function cjSelVerb(i, el) { cjV=i; document.querySelectorAll('.verb-btn').forEach(b=>b.classList.remove('sel')); el.classList.add('sel'); cjRender(); }
function cjSelTense(t, el) { cjT=t; document.querySelectorAll('.tense-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); cjRender(); }

function cjRender() {
  const v=CJ_VERBS[cjV]; const forms=v.f[cjT];
  document.getElementById('cjVhdr').textContent=v.es;
  document.getElementById('cjVsub').textContent=v.en+' — '+cjT;
  document.getElementById('cjGrid').innerHTML=PRONOUNS.map((pr,i)=>`<div class="cj-row"><div class="cj-pr">${pr}</div><input class="cj-inp" id="cji${i}" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="..."></div>`).join('');
  document.getElementById('cjResult').className='cj-result';
  document.getElementById('cjResult').innerHTML='';
  const tips={ar:'Regular -AR: yo(-o) tú(-as) él(-a) nosotros(-amos) vosotros(-áis) ellos(-an)',er:'Regular -ER: yo(-o) tú(-es) él(-e) nosotros(-emos) vosotros(-éis) ellos(-en)',ir:'Regular -IR: yo(-o) tú(-es) él(-e) nosotros(-<strong>imos</strong>) vosotros(-<strong>ís</strong>) ellos(-en)',irreg:'This verb is irregular — forms must be memorized!'};
  document.getElementById('cjTip').innerHTML=`<div class="cj-tip-title">💡 Pattern</div><div class="cj-rule">${tips[v.t]}</div><div class="cj-tip-title" style="margin-top:0.5rem">Correct Forms</div>${PRONOUNS.map((p,i)=>`<div class="cj-rule">${p}: <span>${forms[i]}</span></div>`).join('')}`;
}
function cjCheck() {
  const v=CJ_VERBS[cjV]; const forms=v.f[cjT]; let right=0;
  PRONOUNS.forEach((_,i)=>{
    const inp=document.getElementById('cji'+i); const ok=inp.value.trim().toLowerCase()===forms[i].toLowerCase();
    inp.classList.remove('ok','bad'); inp.classList.add(ok?'ok':'bad'); inp.disabled=true; if(ok)right++;
  });
  const pct=Math.round(right/6*100);
  const r=document.getElementById('cjResult'); r.className='cj-result show';
  r.innerHTML=`${right}/6 correct (${pct}%). ${right===6?'¡Perfecto! 🎉':right>=4?'¡Bien! Review the red ones.':'Keep practicing — check the forms below.'}`;
  ST.conjXP+=right*8; addXP(right*8); if(right>=4) markBlockDone('conj'); saveState();
}
function cjReveal() {
  const v=CJ_VERBS[cjV]; const forms=v.f[cjT];
  PRONOUNS.forEach((_,i)=>{const inp=document.getElementById('cji'+i); inp.value=forms[i]; inp.classList.add('ok'); inp.disabled=true;});
  const r=document.getElementById('cjResult'); r.className='cj-result show';
  r.innerHTML='Forms revealed — study them, then try the next verb!';
}

let rpScenario=null, rpMsgIdx=0;

function rpBuildList() {
  const el = document.getElementById('rpListWrap');
  el.innerHTML = '<div style="padding:0.9rem;"><div class="sec-label">Choose a Scenario</div>'+
    SCENARIOS.map(s=>`<div class="sc-card" onclick="rpStart('${s.id}')">
      <div class="sc-icon">${s.icon}</div>
      <div><div class="sc-name">${s.name}</div><div class="sc-desc">${s.desc}</div><div class="sc-diff ${s.diff}">${s.diff}</div></div>
    </div>`).join('')+'</div>';
}

function rpStart(id) {
  rpScenario = SCENARIOS.find(s=>s.id===id); rpMsgIdx=0;
  document.getElementById('rpListWrap').classList.add('hidden');
  const chat = document.getElementById('rpChatWrap'); chat.classList.remove('hidden');
  document.getElementById('rpBack').classList.remove('hidden');
  document.getElementById('rpHdrTitle').textContent = rpScenario.icon+' '+rpScenario.name;
  chat.innerHTML = `
    <div class="rp-scene-bar"><div class="rp-sname">${rpScenario.icon} ${rpScenario.name}</div><div class="rp-sdesc">${rpScenario.desc}</div></div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="vocab-hint"><div class="vh-lbl">Vocabulary hints</div><div class="vh-words">${rpScenario.vocab.map(([es,en])=>`<div class="vh-w"><span>${es}</span> = ${en}</div>`).join('')}</div></div>
    <div class="chat-input-row">
      <textarea class="chat-inp" id="chatInp" rows="1" placeholder="Type in Spanish…" onkeydown="rpKey(event)"></textarea>
      <button class="chat-send" id="chatSend" onclick="rpSend()">↑</button>
    </div>`;
  rpNextNative();
}

function rpGoBack() {
  document.getElementById('rpListWrap').classList.remove('hidden');
  document.getElementById('rpChatWrap').classList.add('hidden');
  document.getElementById('rpBack').classList.add('hidden');
  document.getElementById('rpHdrTitle').textContent='Role-Play';
  rpScenario=null;
}

function rpKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();rpSend();} }

function rpNextNative() {
  if(!rpScenario||rpMsgIdx>=rpScenario.script.length) return;
  const msg=rpScenario.script[rpMsgIdx]; if(msg.role!=='native') return;
  setTimeout(()=>{
    rpAddMsg('native',msg.text,msg.hint); rpMsgIdx++;
  }, 400);
}

function rpSend() {
  const inp=document.getElementById('chatInp'); const txt=inp.value.trim(); if(!txt) return;
  inp.value='';
  rpAddMsg('learner',txt,'');
  addXP(15);
  const lower=txt.toLowerCase();
  let fb='<span style="color:var(--ink3)">💡 Try using vocabulary from the hint list</span>';
  for (const rule of RP_RULES) {
    if (rule.words.some(w=>lower.includes(w))) { fb=`<span class="gd">${rule.msg}</span>`; break; }
  }
  setTimeout(()=>{
    const msgs=document.getElementById('chatMsgs');
    const lastL=[...msgs.querySelectorAll('.msg.learner')].pop();
    if(lastL){const fbb=document.createElement('div');fbb.className='msg-fb';fbb.innerHTML=fb;lastL.appendChild(fbb);}
    if(rpMsgIdx<rpScenario.script.length){rpNextNative();}
    else{
      rpAddMsg('native','¡Muy bien! Completaste el escenario. ¡Excelente trabajo!','');
      markBlockDone('roleplay'); ST.rpDone++; addXP(50); saveState();
      document.getElementById('chatSend').disabled=true;
      document.getElementById('chatInp').disabled=true;
    }
    msgs.scrollTop=msgs.scrollHeight;
  }, 600);
}

function rpAddMsg(role,text,hint) {
  const msgs=document.getElementById('chatMsgs');
  const d=document.createElement('div'); d.className='msg '+role;
  d.innerHTML=`<div class="msg-bubble">${text}</div>${hint?`<div class="msg-hint">💡 ${hint}</div>`:''}`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

let testName=null, testQ=0, testCorrect=0, testAnswered=[];

    <div class="test-intro-body">Complete a quiz after each learning block. Track your progress, spot weaknesses, and use the <strong>Placement Test</strong> to see if you're ready to skip ahead.</div>
  </div>
  <div class="sec-label">Choose a Test</div>
  ${Object.entries(TEST_BANKS).map(([name,bank])=>`<div class="qtc" onclick="testStart('${name}')">
    <div class="qtc-icon">${bank.icon}</div>
    <div style="flex:1;min-width:0;"><div class="qtc-name">${name}</div><div class="qtc-desc">${bank.desc}</div></div>
    <div class="qtc-count">${bank.count}Q</div>

  ${scores.length ? `<div class="past-results">

function testStart(name) {
  testName=name; testQ=0; testCorrect=0; testAnswered=[];
  document.getElementById('testHomeWrap').classList.add('hidden');
  document.getElementById('testResultsWrap').classList.add('hidden');
  const ta=document.getElementById('testActiveWrap'); ta.classList.remove('hidden');
  document.getElementById('testBack').classList.remove('hidden');
  document.getElementById('testHdrTitle').textContent=name;
  ta.innerHTML=`<div class="test-prog-bar"><div class="test-prog-fill" id="tFill"></div></div>
    <div class="test-content fade-in" id="tContent"></div>
    <div class="test-nav">
      <button class="tn-prev" id="tPrev" onclick="testPrev()">← Back</button>
      <div class="test-dots" id="tDots"></div>
      <button class="tn-next" id="tNext" onclick="testNextQ()" disabled>Next →</button>
    </div>`;
  testRenderQ();
}

function testGoBack() {
  document.getElementById('testHomeWrap').classList.remove('hidden');
  document.getElementById('testActiveWrap').classList.add('hidden');
  document.getElementById('testResultsWrap').classList.add('hidden');
  document.getElementById('testBack').classList.add('hidden');
  document.getElementById('testHdrTitle').textContent='Assessment';
  testBuildHome();
}

function testRenderQ() {
  const bank=TEST_BANKS[testName]; const qs=bank.qs; const q=qs[testQ];
  document.getElementById('tFill').style.width=(testQ/qs.length*100)+'%';
  const dots=document.getElementById('tDots');
  dots.innerHTML=qs.map((_,i)=>{
    let c='t-dot'; if(i<testAnswered.length)c+=' '+(testAnswered[i]?'ok':'bad'); else if(i===testQ)c+=' cur';
    return `<div class="${c}"></div>`;
  }).join('');
  const nb=document.getElementById('tNext'); nb.textContent=testQ===qs.length-1?'Finish ✓':'Next →'; nb.disabled=testAnswered.length<=testQ;
  document.getElementById('tPrev').disabled=testQ===0;
  const c=document.getElementById('tContent'); c.innerHTML=''; c.scrollTop=0;
  const d=document.createElement('div'); d.className='fade-in'; d.style.cssText='display:flex;flex-direction:column;gap:0.6rem;';
  const already=testAnswered.length>testQ;
  const letters=['A','B','C','D'];

  if (q.type==='mc') {
    d.innerHTML=`<div class="t-q-num">Q${testQ+1} of ${qs.length}${q.level?' · Level '+q.level:''}</div>
    <div class="t-q">${q.q}</div>
    <div style="display:flex;flex-direction:column;gap:0.45rem;" id="tOpts">${q.opts.map((o,i)=>`<button class="q-opt ${already?(i===q.c?(testAnswered[testQ]&&i===q._sel?'correct':'show-c'):(i===q._sel&&!testAnswered[testQ]?'wrong':'')):''} ${already?'dis':''}" data-i="${i}" onclick="testCheckMC(${i})">${already&&i===q.c?'<div class="q-ltr">✓</div>':'<div class="q-ltr">'+letters[i]+'</div>'}<div>${o}</div></button>`).join('')}</div>
    <div class="fb-box ${already?'show '+(testAnswered[testQ]?'ok':'bad'):''}" id="tFb">${already?((testAnswered[testQ]?'✓ ':'✗ ')+q.exp):''}</div>`;
  } else {
    d.innerHTML=`<div class="t-q-num">Q${testQ+1} of ${qs.length}${q.level?' · Level '+q.level:''}</div>
    <div class="t-q">${q.q}</div>
    <div class="t-fill-sent">${q.sentence[0]}<input class="fill-inp ${already?(testAnswered[testQ]?'ok':'bad'):''}" id="tFillInp" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="___" ${already?`disabled value="${q._entered||''}"`:''}>${q.sentence[1]}</div>
    <button class="t-check" id="tCheckBtn" onclick="testCheckFill()" ${already?'disabled':''}>Check</button>
    <div class="fb-box ${already?'show '+(testAnswered[testQ]?'ok':'bad'):''}" id="tFb2">${already?((testAnswered[testQ]?'✓ Correct! ':`✗ Answer: <strong>${q.answer}</strong>. `)+q.exp):''}</div>`;
    if(!already){const inp=document.getElementById('tFillInp');if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')testCheckFill();});}
  }

}

function testCheckMC(sel) {
  if(testAnswered.length>testQ)return;
  const q=TEST_BANKS[testName].qs[testQ]; const ok=sel===q.c;
  q._sel=sel; testAnswered.push(ok); if(ok)testCorrect++;
  document.querySelectorAll('#tOpts .q-opt').forEach((o,i)=>{
    o.classList.add('dis'); o.disabled=true;
    if(i===q.c)o.classList.add(ok&&i===sel?'correct':'show-c');
    if(i===sel&&!ok)o.classList.add('wrong');
  });
  const fb=document.getElementById('tFb'); fb.className='fb-box show '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'✓ ':'✗ ')+q.exp;
  document.getElementById('tNext').disabled=false;
  testUpdateDots();
}
function testCheckFill() {
  if(testAnswered.length>testQ)return;
  const q=TEST_BANKS[testName].qs[testQ];
  const inp=document.getElementById('tFillInp'); const val=inp.value.trim();
  const ok=val.toLowerCase()===q.answer.toLowerCase();
  q._entered=val; testAnswered.push(ok); if(ok)testCorrect++;
  inp.classList.add(ok?'ok':'bad'); inp.disabled=true;
  document.getElementById('tCheckBtn').disabled=true;
  const fb=document.getElementById('tFb2'); fb.className='fb-box show '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'✓ Correct! ':`✗ Answer: <strong>${q.answer}</strong>. `)+q.exp;
  document.getElementById('tNext').disabled=false;
  testUpdateDots();
}
function testUpdateDots() {
  const qs=TEST_BANKS[testName].qs; const dots=document.getElementById('tDots'); if(!dots)return;
  dots.innerHTML=qs.map((_,i)=>{let c='t-dot';if(i<testAnswered.length)c+=' '+(testAnswered[i]?'ok':'bad');else if(i===testQ)c+=' cur';return `<div class="${c}"></div>`;}).join('');
}
function testPrev(){if(testQ>0){testQ--;testRenderQ();}}
function testNextQ(){const qs=TEST_BANKS[testName].qs;if(testQ<qs.length-1){testQ++;testRenderQ();}else testShowResults();}

function getSpeedCards() {
  var cards = [];
  var decks = ['Essentials','Core Verbs','Adjectives','Common Phrases','Family & Relationships','Food & Drink'];
  decks.forEach(function(dk){
    if (FC_DECKS[dk]) {
      FC_DECKS[dk].forEach(function(c){ cards.push({es:c.es,en:c.en}); });
    }
  });
  // shuffle
  for (var i=cards.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cards[i];cards[i]=cards[j];cards[j]=t;}
  return cards.slice(0,40);
}

// ── WORD MATCH ──────────────────────────────────────────
var matchSet = 0, matchSelected = null, matchMatchedCount = 0, matchErrors = 0;

function matchStart(container) {
  matchSet = Math.floor(Math.random() * WM_SETS.length);
  matchRender(container);
}

function matchRender(container) {
  var set = WM_SETS[matchSet];
  matchSelected = null; matchMatchedCount = 0; matchErrors = 0;

  container.innerHTML = '';

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.style.cssText = 'flex-shrink:0;';
  hdr.innerHTML = '<button class="back-btn" id="matchBack">&#8592;</button>'
    +'<div style="font-weight:700;color:var(--ink);font-size:0.9rem;">'+set.title+'</div>'
    +'<div class="match-score" id="matchScore" style="margin-left:auto;padding:0">0/'+set.pairs.length+'</div>';
  container.appendChild(hdr);
  document.getElementById('matchBack').addEventListener('click', pracGoHome);

  // Instructions
  var instr = document.createElement('div');
  instr.style.cssText = 'text-align:center;font-size:0.75rem;color:var(--ink3);padding:0.5rem;flex-shrink:0;';
  instr.textContent = 'Tap a Spanish word, then its English match';
  container.appendChild(instr);

  // Build shuffled pairs
  var spanish = set.pairs.map(function(p){return {text:p[0],pair:p[1],side:'es'};});
  var english = set.pairs.map(function(p){return {text:p[1],pair:p[0],side:'en'};});

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
  shuffle(spanish); shuffle(english);

  // Interleave into grid
  var combined = [];
  for (var i=0;i<spanish.length;i++){combined.push(spanish[i]);combined.push(english[i]);}
  shuffle(combined);

  var grid = document.createElement('div');
  grid.className = 'match-grid';
  grid.style.flex = '1';

  combined.forEach(function(item, idx) {
    var btn = document.createElement('button');
    btn.className = 'match-btn';
    btn.textContent = item.text;
    btn.setAttribute('data-text', item.text);
    btn.setAttribute('data-pair', item.pair);
    btn.setAttribute('data-side', item.side);
    btn.addEventListener('click', function(){ matchTap(this, set.pairs.length, container); });
    grid.appendChild(btn);
  });
  container.appendChild(grid);

  // Next set button (hidden initially)
  var nextBtn = document.createElement('div');
  nextBtn.id = 'matchNext';
  nextBtn.style.cssText = 'padding:0.7rem;display:none;flex-shrink:0;';
  nextBtn.innerHTML = '<button class="btn-primary" style="width:100%" id="matchNextBtn">Next Set &#8594;</button>';
  container.appendChild(nextBtn);
  document.getElementById('matchNextBtn').addEventListener('click', function(){
    matchSet = (matchSet+1) % WM_SETS.length;
    matchRender(container);
  });
}

function matchTap(btn, total, container) {
  if (btn.classList.contains('matched')) return;

  if (!matchSelected) {
    // First tap
    document.querySelectorAll('.match-btn.selected').forEach(function(b){b.classList.remove('selected');});
    btn.classList.add('selected');
    matchSelected = btn;
  } else {
    if (matchSelected === btn) {
      btn.classList.remove('selected');
      matchSelected = null;
      return;
    }
    // Check match
    var a = matchSelected, b = btn;
    var isMatch = (a.getAttribute('data-pair') === b.getAttribute('data-text')) &&
                  (b.getAttribute('data-pair') === a.getAttribute('data-text'));

    if (isMatch) {
      a.classList.remove('selected');
      a.classList.add('matched');
      b.classList.add('matched');
      matchMatchedCount++;
      matchSelected = null;
      var score = document.getElementById('matchScore');
      if (score) score.textContent = matchMatchedCount+'/'+total;
      addXP(5);
      if (matchMatchedCount === total) {
        document.getElementById('matchNext').style.display = 'block';
        markBlockDone('practice');
      }
    } else {
      matchErrors++;
      a.classList.add('wrong'); b.classList.add('wrong');
      setTimeout(function(){
        a.classList.remove('wrong','selected'); b.classList.remove('wrong');
        matchSelected = null;
      }, 600);
    }
  }
}

// ── SENTENCE BUILDER ──────────────────────────────────────
var sbIdx = 0, sbPlaced = [], sbExOrder = [];

function sbStart(container) {
  sbExOrder = SB_EXERCISES.map(function(_,i){return i;});
  for(var i=sbExOrder.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=sbExOrder[i];sbExOrder[i]=sbExOrder[j];sbExOrder[j]=t;}
  sbIdx = 0; sbPlaced = [];
  sbRender(container);
}

function sbRender(container) {
  var ex = SB_EXERCISES[sbExOrder[sbIdx]];
  sbPlaced = [];

  // Shuffle word pool
  var pool = ex.words.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}

  container.innerHTML = '';

  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.style.cssText = 'flex-shrink:0;';
  hdr.innerHTML = '<button class="back-btn" id="sbBack">&#8592;</button>'
    +'<div style="font-weight:700;color:var(--ink);font-size:0.88rem;">Sentence Builder</div>'
    +'<div style="margin-left:auto;font-size:0.68rem;color:var(--ink3);">'+(sbIdx+1)+'/'+SB_EXERCISES.length+'</div>';
  container.appendChild(hdr);
  document.getElementById('sbBack').addEventListener('click', pracGoHome);

  var scroll = document.createElement('div');
  scroll.style.cssText = 'flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.5rem;';

  // Progress
  var prog = document.createElement('div');
  prog.className = 'prog-bar';
  prog.innerHTML = '<div class="prog-fill" style="width:'+(sbIdx/SB_EXERCISES.length*100)+'%"></div>';
  scroll.appendChild(prog);

  // English prompt
  var eng = document.createElement('div');
  eng.className = 'sb-english';
  eng.textContent = ex.en;
  scroll.appendChild(eng);

  var hint = document.createElement('div');
  hint.className = 'sb-hint';
  hint.textContent = '&#128161; Tap words to build the Spanish sentence';
  scroll.appendChild(hint);

  // Answer zone
  var zone = document.createElement('div');
  zone.className = 'sb-answer-zone';
  zone.id = 'sbZone';
  scroll.appendChild(zone);

  // Word pool
  var wordPool = document.createElement('div');
  wordPool.className = 'sb-word-pool';
  wordPool.id = 'sbPool';
  pool.forEach(function(w, i){
    var btn = document.createElement('button');
    btn.className = 'sb-word';
    btn.textContent = w;
    btn.setAttribute('data-word', w);
    btn.setAttribute('data-idx', i);
    btn.addEventListener('click', function(){
      if (!this.classList.contains('used')) sbAddWord(this.getAttribute('data-word'), this);
    });
    wordPool.appendChild(btn);
  });
  scroll.appendChild(wordPool);

  // Feedback
  var fb = document.createElement('div');
  fb.className = 'sb-feedback';
  fb.id = 'sbFb';
  fb.style.display = 'none';
  scroll.appendChild(fb);

  // Buttons
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:0.5rem;';
  var checkBtn = document.createElement('button');
  checkBtn.className = 'btn-primary';
  checkBtn.textContent = 'Check';
  checkBtn.style.flex = '1';
  checkBtn.id = 'sbCheck';
  checkBtn.addEventListener('click', function(){ sbCheck(ex, container); });
  var clearBtn = document.createElement('button');
  clearBtn.className = 'btn-ghost';
  clearBtn.textContent = 'Clear';
  clearBtn.addEventListener('click', function(){ sbClear(); });
  btnRow.appendChild(checkBtn);
  btnRow.appendChild(clearBtn);
  scroll.appendChild(btnRow);

  container.appendChild(scroll);
}

function sbAddWord(word, btn) {
  sbPlaced.push(word);
  btn.classList.add('used');
  var zone = document.getElementById('sbZone');
  var placed = document.createElement('button');
  placed.className = 'sb-placed';
  placed.textContent = word;
  placed.setAttribute('data-word', word);
  placed.title = 'Tap to remove';
  placed.addEventListener('click', function(){
    sbPlaced.splice(sbPlaced.indexOf(word), 1);
    this.remove();
    // Re-enable in pool
    document.querySelectorAll('#sbPool .sb-word').forEach(function(b){
      if (b.getAttribute('data-word') === word && b.classList.contains('used')) {
        b.classList.remove('used'); return;
      }
    });
  });
  zone.appendChild(placed);
}

function sbClear() {
  sbPlaced = [];
  document.getElementById('sbZone').innerHTML = '';
  document.querySelectorAll('#sbPool .sb-word').forEach(function(b){b.classList.remove('used');});
  document.getElementById('sbFb').style.display = 'none';
}

function sbCheck(ex, container) {
  var answer = sbPlaced.join(' ');
  var correct = ex.es;
  // Normalize for comparison
  var norm = function(s){return s.replace(/[¿¡]/g,'').replace(/[.,!?]/g,'').toLowerCase().trim();};
  var isOk = norm(answer) === norm(correct);

  var zone = document.getElementById('sbZone');
  var fb = document.getElementById('sbFb');
  fb.style.display = 'block';

  if (isOk) {
    zone.classList.add('correct-zone');
    fb.className = 'sb-feedback ok';
    fb.innerHTML = '&#10003; ¡Perfecto! ' + correct;
    addXP(10);
    // Auto-advance after 1.5s
    setTimeout(function(){
      zone.classList.remove('correct-zone');
      sbIdx = (sbIdx+1) % SB_EXERCISES.length;
      sbPlaced = [];
      sbRender(container);
      markBlockDone('practice');
    }, 1800);
  } else {
    zone.classList.add('wrong-zone');
    fb.className = 'sb-feedback bad';
    fb.innerHTML = '&#10007; Not quite. Correct: <strong>' + correct + '</strong>';
    setTimeout(function(){zone.classList.remove('wrong-zone');}, 800);
  }
}

// ── STORY MODE ──────────────────────────────────────────
var storyIdx = 0;

function storyStart(container) {
  storyIdx = -1; // -1 = list view
  storyRenderList(container);
}

function storyRenderList(container) {
  container.innerHTML = '';
  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.style.cssText = 'flex-shrink:0;';
  hdr.innerHTML = '<button class="back-btn" id="storyBack">&#8592;</button>'
    +'<div style="font-weight:700;color:var(--ink);font-size:0.9rem;">Story Mode</div>';
  container.appendChild(hdr);
  document.getElementById('storyBack').addEventListener('click', pracGoHome);

  var scroll = document.createElement('div');
  scroll.style.cssText = 'flex:1;overflow-y:auto;padding:0.9rem;';
  scroll.innerHTML = '<div class="sec-label">Choose a Story</div>';

  STORIES.forEach(function(story, i){
    var card = document.createElement('div');
    card.className = 'story-card';
    card.innerHTML = '<div class="story-level" style="color:'+story.levelColor+'">'+story.level.toUpperCase()+'</div>'
      +'<div class="story-title">'+story.title+'</div>'
      +'<div class="story-preview">'+story.preview+'</div>';
    card.addEventListener('click', function(){ storyRead(i, container); });
    scroll.appendChild(card);
  });
  container.appendChild(scroll);
}

function storyRead(i, container) {
  var story = STORIES[i];
  container.innerHTML = '';

  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.style.cssText = 'flex-shrink:0;';
  hdr.innerHTML = '<button class="back-btn" id="storyBackList">&#8592;</button>'
    +'<div style="font-weight:700;color:var(--ink);font-size:0.88rem;">'+story.title+'</div>';
  container.appendChild(hdr);
  document.getElementById('storyBackList').addEventListener('click', function(){ storyRenderList(container); });

  var scroll = document.createElement('div');
  scroll.style.cssText = 'flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.7rem;';

  var txt = document.createElement('div');
  txt.className = 'story-text';
  txt.innerHTML = story.text;
  scroll.appendChild(txt);

  scroll.innerHTML += '<div class="sec-label">Comprehension Questions</div>';

  var score = 0;
  story.questions.forEach(function(q, qi){
    var qDiv = document.createElement('div');
    var letters = ['A','B','C','D'];
    qDiv.innerHTML = '<div class="story-q">'+(qi+1)+'. '+q.q+'</div>';
    var opts = document.createElement('div');
    opts.className = 'story-opts';
    q.opts.forEach(function(opt, oi){
      var btn = document.createElement('button');
      btn.className = 'q-opt';
      btn.innerHTML = '<div class="q-ltr">'+letters[oi]+'</div><div>'+opt+'</div>';
      btn.setAttribute('data-qi', qi);
      btn.addEventListener('click', function(){
        if (this.getAttribute('data-answered')) return;
        var isOk = oi === q.c;
        opts.querySelectorAll('.q-opt').forEach(function(b,bi){
          b.setAttribute('data-answered','1');
          b.classList.add('dis');
          if (bi === q.c) b.classList.add('show-c');
          if (bi === oi && !isOk) b.classList.add('wrong');
        });
        if (isOk) { score++; addXP(8); }
      });
      opts.appendChild(btn);
    });
    qDiv.appendChild(opts);
    scroll.appendChild(qDiv);
  });

  var doneBtn = document.createElement('button');
  doneBtn.className = 'btn-primary';
  doneBtn.style.cssText = 'margin-top:0.5rem;';
  doneBtn.textContent = 'Back to Stories';
  doneBtn.addEventListener('click', function(){
    markBlockDone('practice');
    storyRenderList(container);
  });
  scroll.appendChild(doneBtn);
  container.appendChild(scroll);
}

// ── SPEED ROUND ──────────────────────────────────────────
var speedCards = [], speedIdx = 0, speedCorrect = 0, speedTimer = null, speedTimeLeft = 8;

function speedStart(container) {
  speedCards = getSpeedCards();
  speedIdx = 0; speedCorrect = 0;
  speedRender(container);
}

function speedRender(container) {
  if (speedIdx >= speedCards.length) { speedResults(container); return; }
  var card = speedCards[speedIdx];

  // Build 4 options: correct + 3 random
  var all = speedCards.map(function(c){return c.en;});
  var opts = [card.en];
  var tries = 0;
  while (opts.length < 4 && tries < 50) {
    var r = all[Math.floor(Math.random()*all.length)];
    if (opts.indexOf(r) < 0) opts.push(r);
    tries++;
  }
  // shuffle opts
  for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=opts[i];opts[i]=opts[j];opts[j]=t;}

  container.innerHTML = '';

  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.style.cssText = 'flex-shrink:0;';
  hdr.innerHTML = '<button class="back-btn" id="speedBack">&#8592;</button>'
    +'<div style="font-weight:700;color:var(--ink);font-size:0.88rem;">Speed Round</div>'
    +'<div style="margin-left:auto;font-size:0.68rem;color:var(--ink3);">'+(speedIdx+1)+'/'+speedCards.length+'</div>';
  container.appendChild(hdr);
  document.getElementById('speedBack').addEventListener('click', function(){
    clearInterval(speedTimer);
    pracGoHome();
  });

  var body = document.createElement('div');
  body.style.cssText = 'flex:1;display:flex;flex-direction:column;padding:1rem;gap:0.7rem;';

  // Stats row
  var stats = document.createElement('div');
  stats.className = 'speed-stats';
  stats.innerHTML = '<div class="spstat"><div class="spstat-num" style="color:var(--green)">'+speedCorrect+'</div><div class="spstat-lbl">Correct</div></div>'
    +'<div class="spstat"><div class="spstat-num" style="color:var(--red)">'+(speedIdx-speedCorrect)+'</div><div class="spstat-lbl">Wrong</div></div>';
  body.appendChild(stats);

  // Timer bar
  speedTimeLeft = 8;
  var timerWrap = document.createElement('div');
  timerWrap.className = 'speed-timer-bar';
  var timerFill = document.createElement('div');
  timerFill.className = 'speed-timer-fill';
  timerFill.id = 'speedTimerFill';
  timerFill.style.width = '100%';
  timerWrap.appendChild(timerFill);
  body.appendChild(timerWrap);

  // Word
  var wordEl = document.createElement('div');
  wordEl.className = 'speed-word';
  wordEl.textContent = card.es;
  body.appendChild(wordEl);

  // Options
  var optsGrid = document.createElement('div');
  optsGrid.className = 'speed-btns';
  opts.forEach(function(opt){
    var btn = document.createElement('button');
    btn.className = 'speed-opt';
    btn.textContent = opt;
    btn.addEventListener('click', function(){
      clearInterval(speedTimer);
      var isOk = opt === card.en;
      optsGrid.querySelectorAll('.speed-opt').forEach(function(b){
        b.classList.add('dis');
        if (b.textContent === card.en) b.classList.add('correct');
        if (b === btn && !isOk) b.classList.add('wrong');
      });
      if (isOk) speedCorrect++;
      addXP(isOk?6:0);
      setTimeout(function(){
        speedIdx++;
        speedRender(container);
      }, 700);
    });
    optsGrid.appendChild(btn);
  });
  body.appendChild(optsGrid);
  container.appendChild(body);

  // Start timer
  clearInterval(speedTimer);
  speedTimer = setInterval(function(){
    speedTimeLeft -= 0.1;
    var pct = (speedTimeLeft/8)*100;
    var fill = document.getElementById('speedTimerFill');
    if (fill) {
      fill.style.width = pct+'%';
      fill.className = 'speed-timer-fill' + (pct<30?' danger':pct<50?' warn':'');
    }
    if (speedTimeLeft <= 0) {
      clearInterval(speedTimer);
      speedIdx++;
      speedRender(container);
    }
  }, 100);
}

function speedResults(container) {
  clearInterval(speedTimer);
  var pct = Math.round(speedCorrect/speedCards.length*100);
  markBlockDone('practice');
  addXP(speedCorrect*5);

  container.innerHTML = '';
  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.style.cssText = 'flex-shrink:0;';
  hdr.innerHTML = '<button class="back-btn" id="speedDoneBack">&#8592;</button>'
    +'<div style="font-weight:700;color:var(--ink);">Speed Round</div>';
  container.appendChild(hdr);
  document.getElementById('speedDoneBack').addEventListener('click', pracGoHome);

  var body = document.createElement('div');
  body.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:1rem;';
  body.innerHTML = '<div style="font-size:2.5rem">'+(pct>=80?'🔥':pct>=60?'👍':'📚')+'</div>'
    +'<div style="font-family:Impact,sans-serif;font-size:2rem;letter-spacing:0.05em;color:var(--ink)">'+(pct>=80?'¡FUEGO!':pct>=60?'¡BIEN!':'¡SIGUE!')+'</div>'
    +'<div style="font-size:3rem;font-weight:800;color:'+(pct>=80?'var(--green)':pct>=60?'var(--warm)':'var(--red)')+'">'+pct+'%</div>'
    +'<div style="font-size:0.85rem;color:var(--ink2)">'+speedCorrect+' of '+speedCards.length+' correct</div>'
    +'<button class="btn-primary" id="speedRetry">Play Again</button>'
    +'<button class="btn-ghost" id="speedHome">Back to Practice</button>';
  container.appendChild(body);
  document.getElementById('speedRetry').addEventListener('click', function(){ speedStart(container); });
  document.getElementById('speedHome').addEventListener('click', pracGoHome);
}

function init() {
  loadState();
  applyThemeIcon();
  buildHome();
  fcInit();
  grBuildList();
  conjBuildUI();
  rpBuildList();
  testBuildHome();
  // Auto-save every 30s
  setInterval(saveState, 30000);
}

init();
</script>
