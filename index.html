<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aprende Español</title>
<style>
/* System fonts — fully offline, no CDN dependency */
</style>
<style>
/* ═══════════════════════════════════════════
   THEME TOKENS — fully accessible contrast
═══════════════════════════════════════════ */
:root {
  /* accent palette — same in both modes */
  --green:  #00c97a;
  --green2: #009958;
  --green-bg: rgba(0,201,122,0.12);
  --red:    #f05050;
  --red2:   #c03030;
  --red-bg: rgba(240,80,80,0.12);
  --blue:   #4da6ff;
  --blue2:  #2680d9;
  --warm:   #f5a623;
  --warm2:  #c07d10;
  --purple: #b08ef0;
}

/* ── DARK MODE ── */
[data-theme="dark"] {
  --bg:        #0e1210;
  --bg2:       #131a16;
  --surface:   #192118;
  --surface2:  #1f2b22;
  --surface3:  #263328;
  --ink:       #f2faf5;       /* primary text   — contrast 15:1 on --bg  */
  --ink2:      #d4ead9;       /* secondary text — contrast 10:1 on --bg  */
  --ink3:      #a8c9b0;       /* tertiary text  — contrast  6.5:1        */
  --border:    rgba(0,201,122,0.14);
  --border2:   rgba(255,255,255,0.09);
  --shadow:    0 4px 24px rgba(0,0,0,0.5);
  --input-bg:  #1f2b22;
}

/* ── LIGHT MODE ── */
[data-theme="light"] {
  --bg:        #f4f7f5;
  --bg2:       #ffffff;
  --surface:   #ffffff;
  --surface2:  #eaf2ec;
  --surface3:  #d8ebe0;
  --ink:       #060f0a;       /* primary text   — contrast 18:1 on --bg  */
  --ink2:      #162b1e;       /* secondary text — contrast 12:1 on --bg  */
  --ink3:      #254d33;       /* tertiary text  — contrast  7.5:1        */
  --border:    rgba(0,150,80,0.2);
  --border2:   rgba(0,0,0,0.1);
  --shadow:    0 2px 12px rgba(0,0,0,0.1);
  --input-bg:  #eaf2ec;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
  transition:background 0.25s,color 0.25s;
}

/* scrollbars */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

/* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
.view{display:none;flex-direction:column;flex:1;overflow:hidden;}
.view.active{display:flex;}

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
.bnav{
  display:flex;align-items:center;justify-content:space-around;
  background:var(--surface);border-top:1px solid var(--border2);
  padding:0.45rem 0 0.55rem;flex-shrink:0;z-index:100;
}
.ni{display:flex;flex-direction:column;align-items:center;gap:0.18rem;cursor:pointer;padding:0.25rem 0.6rem;border-radius:10px;transition:all 0.15s;border:none;background:transparent;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;}
.ni.active{color:var(--green);}
.ni .ico{font-size:1.15rem;transition:transform 0.15s;}
.ni.active .ico{transform:scale(1.1);}
.ni .lbl{font-size:0.55rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:inherit;}

/* ═══════════════════════════════════════════
   SHARED COMPONENTS
═══════════════════════════════════════════ */
.page-header{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.75rem 1rem 0.6rem;
  background:var(--surface);
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.page-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.25rem;letter-spacing:0.04em;color:var(--ink);}
.back-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--ink2);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.back-btn:hover{border-color:var(--green);color:var(--green);}
.theme-btn{margin-left:auto;width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);background:transparent;color:var(--ink2);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.theme-btn:hover{border-color:var(--warm);color:var(--warm);}

.scroll-area{flex:1;overflow-y:auto;padding:0.9rem;}

/* ─── pill tags ─── */
.tag{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:100px;font-size:0.59rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;}
.tag-green{background:var(--green-bg);color:var(--green);}
.tag-blue{background:rgba(77,166,255,0.15);color:var(--blue);}
.tag-warm{background:rgba(245,166,35,0.15);color:var(--warm);}
.tag-red{background:var(--red-bg);color:var(--red);}
.tag-purple{background:rgba(176,142,240,0.15);color:var(--purple);}

/* ─── cards ─── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:0.9rem 1rem;}
.card-hover{cursor:pointer;transition:all 0.18s;}
.card-hover:hover{border-color:var(--green);transform:translateY(-1px);}

/* ─── section label ─── */
.sec-label{font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:0.7rem 0 0.35rem;}

/* ─── progress bar ─── */
.prog-bar{height:4px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--green2),var(--green));transition:width 0.5s ease;}

/* ─── quiz option shared ─── */
.q-opt{
  background:var(--surface);border:1.5px solid var(--border2);border-radius:10px;
  padding:0.65rem 0.85rem;cursor:pointer;font-size:0.82rem;color:var(--ink);
  text-align:left;display:flex;align-items:center;gap:0.6rem;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-weight:500;transition:all 0.15s;line-height:1.4;
}
.q-opt:hover:not(.dis){border-color:var(--blue);background:rgba(77,166,255,0.06);}
.q-opt.correct{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--green)!important;}
.q-opt.wrong{border-color:var(--red)!important;background:var(--red-bg)!important;color:var(--red)!important;}
.q-opt.show-c{border-color:var(--green)!important;background:var(--green-bg)!important;}
.q-opt.dis{cursor:default;}
.q-ltr{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:700;flex-shrink:0;color:var(--ink3);transition:all 0.15s;}
.q-opt.correct .q-ltr,.q-opt.show-c .q-ltr{background:var(--green);border-color:var(--green);color:#fff;}
.q-opt.wrong   .q-ltr{background:var(--red);border-color:var(--red);color:#fff;}

/* ─── fill input shared ─── */
.fill-inp{
  border:none;border-bottom:2.5px solid var(--blue);background:transparent;
  font-family:'SF Mono','Courier New',Courier,monospace;font-size:0.95rem;color:var(--blue);
  width:110px;text-align:center;outline:none;padding:0.1rem 0.3rem;
}
.fill-inp.ok{border-color:var(--green);color:var(--green);}
.fill-inp.bad{border-color:var(--red);color:var(--red);}

/* ─── feedback box shared ─── */
.fb-box{border-radius:10px;padding:0.65rem 0.8rem;font-size:0.8rem;line-height:1.6;display:none;}
.fb-box.show{display:block;}
.fb-box.ok{background:var(--green-bg);border:1px solid rgba(0,201,122,0.25);color:var(--green);}
.fb-box.bad{background:var(--red-bg);border:1px solid rgba(240,80,80,0.25);color:var(--red);}
.fb-box strong{font-weight:700;}

/* ─── primary button ─── */
.btn-primary{
  height:42px;padding:0 1.4rem;border-radius:100px;border:none;
  background:var(--green);color:#0a1a0f;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.82rem;font-weight:700;
  cursor:pointer;letter-spacing:0.04em;transition:all 0.15s;
}
.btn-primary:hover{background:var(--green2);color:#fff;}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;}

.btn-ghost{
  height:38px;padding:0 1.1rem;border-radius:100px;
  border:1px solid var(--border2);background:transparent;
  color:var(--ink2);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.78rem;
  font-weight:600;cursor:pointer;transition:all 0.15s;
}
.btn-ghost:hover{color:var(--ink);border-color:var(--ink3);}
.btn-ghost:disabled{opacity:0.3;cursor:not-allowed;}

/* ─── tip/warn boxes ─── */
.tip-box{background:rgba(176,142,240,0.1);border:1px solid rgba(176,142,240,0.25);border-radius:10px;padding:0.7rem 0.85rem;font-size:0.8rem;color:var(--purple);line-height:1.65;display:flex;gap:0.5rem;}
.warn-box{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);border-radius:10px;padding:0.7rem 0.85rem;font-size:0.8rem;color:var(--warm);line-height:1.65;display:flex;gap:0.5rem;}

/* ─── example block ─── */
.ex-block{background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:0.8rem 0.9rem;display:flex;flex-direction:column;gap:0.6rem;}
.ex-sp{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.05rem;letter-spacing:0.03em;color:var(--blue);}
.ex-en{font-size:0.78rem;color:var(--ink2);}
.ex-note{font-size:0.7rem;color:var(--warm);font-weight:500;}

/* ─── data table ─── */
.g-table{border:1px solid var(--border2);border-radius:12px;overflow:hidden;font-size:0.79rem;}
.g-thead{background:var(--surface2);}
.g-tr{display:grid;border-bottom:1px solid var(--border2);}
.g-tr:last-child{border-bottom:none;}
.g-th,.g-td{padding:0.48rem 0.7rem;border-right:1px solid var(--border2);}
.g-th:last-child,.g-td:last-child{border-right:none;}
.g-th{font-size:0.6rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);}
.g-td{color:var(--ink2);}
.g-td.sp{color:var(--blue);font-family:'SF Mono','Courier New',Courier,monospace;font-size:0.8rem;}

/* ─── conj grid ─── */
.conj-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.35rem;}
.conj-cell{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:0.45rem 0.65rem;}
.conj-cell.hi{background:rgba(77,166,255,0.1);border-color:rgba(77,166,255,0.35);}
.conj-pr{font-size:0.6rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.04em;font-weight:600;}
.conj-fr{font-family:'SF Mono','Courier New',Courier,monospace;font-size:0.9rem;color:var(--blue);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.25s ease;}
.hidden{display:none!important;}

/* ═══════════════════════════════════════════
   ① HOME / DASHBOARD
═══════════════════════════════════════════ */
.hero{
  background:linear-gradient(135deg,var(--surface2),var(--surface3));
  border:1px solid var(--border);border-radius:20px;padding:1.2rem;
  position:relative;overflow:hidden;margin-bottom:0.8rem;
}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,var(--green-bg),transparent 70%);pointer-events:none;}
.hero-eyebrow{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:0.25rem;}
.hero-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:2rem;line-height:1;color:var(--ink);margin-bottom:0.45rem;letter-spacing:0.03em;}
.hero-sub{font-size:0.78rem;color:var(--ink2);line-height:1.5;margin-bottom:0.9rem;}
.badge-row{display:flex;gap:0.5rem;flex-wrap:wrap;}
.badge{display:flex;align-items:center;gap:0.35rem;padding:0.28rem 0.65rem;border-radius:100px;font-size:0.72rem;font-weight:600;}
.badge-streak{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.3);color:var(--warm);}
.badge-xp{background:var(--green-bg);border:1px solid var(--border);color:var(--green);}
.badge-phase{background:rgba(77,166,255,0.12);border:1px solid rgba(77,166,255,0.25);color:var(--blue);}

/* streak calendar */
.streak-calendar{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.85rem 1rem;margin-bottom:0.8rem;}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;}
.sc-title{font-weight:700;font-size:0.85rem;color:var(--ink);}
.sc-sub{font-size:0.7rem;color:var(--ink3);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0.3rem;}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:600;}
.cal-day.empty{background:transparent;}
.cal-day.studied{background:var(--green);color:#fff;}
.cal-day.today{background:var(--blue);color:#fff;}
.cal-day.missed{background:var(--surface2);color:var(--ink3);}
.cal-day.future{background:var(--surface2);color:var(--border2);}

/* daily blocks */
.block-card{
  background:var(--surface);border:1px solid var(--border2);border-radius:14px;
  padding:0.85rem 0.95rem;display:flex;align-items:center;gap:0.85rem;
  cursor:pointer;transition:all 0.18s;margin-bottom:0.5rem;position:relative;overflow:hidden;
}
.block-card:hover{border-color:var(--green);transform:translateY(-1px);}
.block-card.done{border-color:rgba(0,201,122,0.35);}
.block-card.done::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);}
.block-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.bi-g{background:var(--green-bg);}
.bi-b{background:rgba(77,166,255,0.12);}
.bi-p{background:rgba(176,142,240,0.12);}
.bi-w{background:rgba(245,166,35,0.12);}
.bi-r{background:var(--red-bg);}
.block-info{flex:1;min-width:0;}
.block-title{font-weight:700;font-size:0.88rem;color:var(--ink);margin-bottom:0.12rem;}
.block-meta{font-size:0.72rem;color:var(--ink3);}
.block-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;flex-shrink:0;}
.block-time{font-size:0.63rem;color:var(--ink3);font-weight:600;}
.block-arrow{font-size:0.9rem;color:var(--ink3);}

/* accountability alert */
.acct-alert{
  border-radius:14px;padding:0.85rem 1rem;margin-bottom:0.8rem;
  display:flex;gap:0.7rem;align-items:flex-start;
}
.acct-alert.warn{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);}
.acct-alert.danger{background:var(--red-bg);border:1px solid rgba(240,80,80,0.3);}
.acct-alert.success{background:var(--green-bg);border:1px solid rgba(0,201,122,0.3);}
.acct-alert.info{background:rgba(77,166,255,0.1);border:1px solid rgba(77,166,255,0.3);}
.aa-icon{font-size:1.2rem;flex-shrink:0;}
.aa-body{flex:1;}
.aa-title{font-weight:700;font-size:0.82rem;margin-bottom:0.1rem;}
.aa-sub{font-size:0.72rem;line-height:1.5;}
.acct-alert.warn .aa-title,.acct-alert.warn .aa-sub{color:var(--warm);}
.acct-alert.danger .aa-title,.acct-alert.danger .aa-sub{color:var(--red);}
.acct-alert.success .aa-title,.acct-alert.success .aa-sub{color:var(--green);}
.acct-alert.info .aa-title,.acct-alert.info .aa-sub{color:var(--blue);}

/* phase progress */
.phase-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.85rem 1rem;margin-bottom:0.8rem;}
.phase-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;}
.phase-name{font-weight:700;font-size:0.85rem;color:var(--ink);}
.phase-track{height:6px;background:var(--surface2);border-radius:100px;overflow:hidden;margin-bottom:0.35rem;}
.phase-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--blue2),var(--blue));transition:width 0.6s ease;}
.phase-steps{display:flex;justify-content:space-between;}
.ps{font-size:0.59rem;color:var(--ink3);}
.ps.done{color:var(--green);font-weight:600;}

/* stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.8rem;}
.stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:0.75rem 0.85rem;}
.stat-num{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.9rem;line-height:1;color:var(--green);}
.stat-label{font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink3);margin-top:0.1rem;}
.stat-sub{font-size:0.68rem;color:var(--ink3);margin-top:0.15rem;}

/* ═══════════════════════════════════════════
   ② FLASHCARDS
═══════════════════════════════════════════ */
.cat-strip{display:flex;gap:0.35rem;padding:0.5rem 0.85rem;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border2);flex-shrink:0;}
.cat-strip::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:0.27rem 0.68rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.67rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.cat-chip:hover{border-color:var(--green);color:var(--green);}
.cat-chip.active{background:var(--green);border-color:var(--green);color:#0a1a0f;}

.fc-stats-row{display:flex;gap:0.5rem;padding:0.35rem 0.85rem;flex-shrink:0;}
.fcs{font-size:0.68rem;font-weight:700;padding:0.15rem 0.5rem;border-radius:100px;}
.fcs.g{background:var(--green-bg);color:var(--green);}
.fcs.r{background:var(--red-bg);color:var(--red);}

.fc-prog-row{display:flex;align-items:center;gap:0.6rem;padding:0.35rem 0.85rem;flex-shrink:0;}
.fc-pbar-wrap{flex:1;height:2px;background:var(--surface2);border-radius:100px;overflow:hidden;}
.fc-pbar{height:100%;background:var(--green);border-radius:100px;transition:width 0.4s;}
.fc-ptxt{font-size:0.63rem;color:var(--ink3);white-space:nowrap;font-weight:600;font-family:'SF Mono','Courier New',Courier,monospace;}

.fc-search-row{padding:0.3rem 0.85rem;flex-shrink:0;}
.fc-search{width:100%;height:30px;border-radius:100px;border:1px solid var(--border2);background:var(--input-bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.72rem;padding:0 0.9rem;outline:none;transition:border-color 0.15s;}
.fc-search::placeholder{color:var(--ink3);}
.fc-search:focus{border-color:var(--green);}

.card-zone{flex:1;display:flex;align-items:center;justify-content:center;padding:0.4rem 0.85rem 0.2rem;perspective:1200px;min-height:0;}
.card-w{width:100%;max-width:420px;height:min(42vw,200px);position:relative;cursor:pointer;}
.card-i{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);}
.card-i.flipped{transform:rotateY(180deg);}
.cf{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;}
.cf-front{background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);}
.cf-back{background:var(--surface2);border:1px solid rgba(0,201,122,0.2);transform:rotateY(180deg);box-shadow:var(--shadow);}
.cf-tag{position:absolute;top:0.6rem;left:0.9rem;font-size:0.57rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);opacity:0.8;}
.cf-num{position:absolute;top:0.6rem;right:0.9rem;font-size:0.58rem;color:var(--ink3);font-family:'SF Mono','Courier New',Courier,monospace;}
.cf-word{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:clamp(1.7rem,7vw,2.8rem);color:var(--ink);text-align:center;letter-spacing:0.03em;line-height:1.1;margin-bottom:0.2rem;}
.cf-back .cf-word{color:var(--green);font-size:clamp(1.4rem,5.5vw,2.2rem);}
.cf-ph{font-size:0.73rem;color:var(--ink3);font-style:italic;}
.cf-pos{display:inline-block;padding:0.1rem 0.4rem;border-radius:4px;background:rgba(176,142,240,0.15);color:var(--purple);font-size:0.57rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.25rem;}
.cf-ex{font-size:0.67rem;color:var(--ink3);text-align:center;border-top:1px solid var(--border2);padding-top:0.35rem;width:100%;line-height:1.5;}
.cf-ex em{color:var(--warm);font-style:normal;font-weight:600;}
.cf-hint{position:absolute;bottom:0.5rem;font-size:0.57rem;color:var(--ink3);letter-spacing:0.05em;}
.cf-audio{position:absolute;bottom:0.45rem;right:0.75rem;width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--green-bg);color:var(--green);font-size:0.68rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;z-index:5;}
.cf-audio:hover{background:rgba(0,201,122,0.25);}
.cf-audio.on{background:var(--green);color:#fff;}

.fc-ctrl{display:flex;align-items:center;justify-content:center;gap:0.55rem;padding:0.3rem 0.85rem;flex-shrink:0;}
.fc-nav{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);color:var(--ink2);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.fc-nav:hover:not(:disabled){border-color:var(--green);color:var(--green);}
.fc-nav:disabled{opacity:0.2;cursor:not-allowed;}
.fc-flip{flex:1;max-width:170px;height:36px;border-radius:100px;border:1px solid rgba(0,201,122,0.3);background:var(--green-bg);color:var(--green);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.05em;text-transform:uppercase;}
.fc-flip:hover{background:rgba(0,201,122,0.2);}

.fc-rate{display:flex;gap:0.55rem;padding:0.22rem 0.85rem 0.4rem;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;flex-shrink:0;}
.fc-rate.show{opacity:1;pointer-events:all;}
.rate-b{flex:1;max-width:145px;height:34px;border-radius:100px;border:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.7rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.04em;transition:all 0.15s;}
.r-know{background:var(--green-bg);border:1px solid rgba(0,201,122,0.3);color:var(--green);}
.r-know:hover{background:rgba(0,201,122,0.22);}
.r-rev{background:var(--red-bg);border:1px solid rgba(240,80,80,0.3);color:var(--red);}
.r-rev:hover{background:rgba(240,80,80,0.2);}

.fc-foot{display:flex;align-items:center;justify-content:center;gap:0.6rem;padding:0 0.85rem 0.4rem;flex-shrink:0;}
.shuf-btn{padding:0.2rem 0.6rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.59rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;transition:all 0.15s;}
.shuf-btn.on{border-color:var(--warm);color:var(--warm);background:rgba(245,166,35,0.1);}
.deck-inf{font-size:0.59rem;color:var(--ink3);}

/* ═══════════════════════════════════════════
   ③ GRAMMAR
═══════════════════════════════════════════ */
.lesson-item{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.8rem 0.9rem;margin-bottom:0.5rem;cursor:pointer;display:flex;align-items:center;gap:0.8rem;transition:all 0.18s;}
.lesson-item:hover{border-color:var(--blue);}
.lesson-item.done{border-left:3px solid var(--green);}
.li-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:var(--surface2);}
.li-info{flex:1;min-width:0;}
.li-title{font-weight:700;font-size:0.85rem;color:var(--ink);margin-bottom:0.1rem;}
.li-desc{font-size:0.7rem;color:var(--ink3);}
.li-score{font-size:0.68rem;color:var(--green);font-weight:600;}

.unit-hdr{font-size:0.59rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);padding:0.8rem 0 0.3rem;}

/* lesson step */
.gr-prog{height:2px;background:var(--surface2);flex-shrink:0;}
.gr-prog-fill{height:100%;background:var(--blue);transition:width 0.4s;}
.gr-content{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.7rem;}
.step-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.45rem;letter-spacing:0.03em;color:var(--ink);line-height:1.1;}
.step-body{font-size:0.82rem;color:var(--ink2);line-height:1.75;}
.step-body strong{color:var(--ink);font-weight:600;}
.step-body em{color:var(--green);font-style:normal;font-weight:600;}

.gr-nav{padding:0.65rem 0.9rem;background:var(--surface);border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:0.7rem;}
.gr-dots{display:flex;gap:0.3rem;align-items:center;}
.gr-dot{width:5px;height:5px;border-radius:50%;background:var(--surface3);transition:all 0.2s;}
.gr-dot.done{background:var(--green);}
.gr-dot.cur{background:var(--blue);width:15px;border-radius:3px;}
.gr-next{padding:0 1.1rem;height:36px;border-radius:100px;border:none;background:var(--blue);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.gr-next:hover{background:var(--blue2);}
.gr-next:disabled{opacity:0.3;cursor:not-allowed;}
.gr-prev{padding:0 0.9rem;height:36px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.73rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.gr-prev:hover{color:var(--ink);}

.quiz-q{font-size:0.98rem;font-weight:700;color:var(--ink);line-height:1.4;}
.quiz-ctx{font-size:0.73rem;color:var(--ink2);background:var(--surface2);border-radius:8px;padding:0.45rem 0.65rem;border-left:3px solid var(--border2);line-height:1.5;}
.fill-sent{font-size:1.05rem;font-weight:600;color:var(--ink);text-align:center;padding:0.8rem 0.5rem;line-height:1.7;}
.fill-hint{font-size:0.68rem;color:var(--ink3);text-align:center;}
.check-btn{align-self:center;padding:0 1.2rem;height:36px;border-radius:100px;border:none;background:var(--blue);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.check-btn:hover{background:var(--blue2);}
.check-btn:disabled{opacity:0.3;cursor:not-allowed;}

/* lesson complete */
.lesson-complete{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:0.8rem;}
.lc-emoji{font-size:2.8rem;}
.lc-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:2rem;letter-spacing:0.05em;color:var(--blue);}
.score-ring{width:80px;height:80px;border-radius:50%;border:2px solid var(--green);background:var(--green-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sr-num{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.5rem;line-height:1;color:var(--green);}
.sr-lbl{font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--green);}
.lc-sub{font-size:0.8rem;color:var(--ink2);max-width:260px;line-height:1.6;}
.lc-btns{display:flex;flex-direction:column;gap:0.5rem;width:100%;max-width:240px;}

/* ═══════════════════════════════════════════
   ④ CONJUGATION TRAINER
═══════════════════════════════════════════ */
.verb-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;margin-bottom:0.7rem;}
.verb-btn{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:0.55rem 0.7rem;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.77rem;font-weight:600;color:var(--ink2);transition:all 0.15s;text-align:left;}
.verb-btn:hover{border-color:var(--purple);}
.verb-btn.sel{border-color:var(--purple);background:rgba(176,142,240,0.12);color:var(--purple);}
.vb-es{font-family:'SF Mono','Courier New',Courier,monospace;font-size:0.83rem;color:inherit;}
.vb-en{font-size:0.63rem;color:var(--ink3);margin-top:0.08rem;}

.tense-row{display:flex;gap:0.35rem;overflow-x:auto;scrollbar-width:none;margin-bottom:0.7rem;}
.tense-row::-webkit-scrollbar{display:none;}
.tense-btn{flex-shrink:0;padding:0.27rem 0.68rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.66rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tense-btn:hover{border-color:var(--purple);color:var(--purple);}
.tense-btn.active{background:var(--purple);border-color:var(--purple);color:#fff;}

.cj-area{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:0.9rem;margin-bottom:0.7rem;}
.cj-verb-hdr{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.5rem;color:var(--purple);letter-spacing:0.04em;margin-bottom:0.15rem;}
.cj-verb-sub{font-size:0.72rem;color:var(--ink3);margin-bottom:0.7rem;}
.cj-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;}
.cj-row{display:flex;flex-direction:column;gap:0.12rem;}
.cj-pr{font-size:0.59rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.05em;}
.cj-inp{background:var(--input-bg);border:1px solid var(--border2);border-radius:8px;padding:0.4rem 0.6rem;font-family:'SF Mono','Courier New',Courier,monospace;font-size:0.87rem;color:var(--purple);outline:none;width:100%;transition:border-color 0.15s;}
.cj-inp:focus{border-color:var(--purple);}
.cj-inp.ok{border-color:var(--green);color:var(--green);}
.cj-inp.bad{border-color:var(--red);color:var(--red);}
.cj-inp:disabled{opacity:0.7;}
.cj-result{background:var(--surface2);border-radius:10px;padding:0.6rem 0.75rem;font-size:0.78rem;color:var(--ink2);display:none;margin-top:0.5rem;line-height:1.5;}
.cj-result.show{display:block;}
.cj-btns{display:flex;gap:0.6rem;margin-bottom:0.8rem;}
.cj-check{flex:1;height:40px;border-radius:100px;border:none;background:var(--purple);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.79rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.cj-check:hover{background:#8a6be0;}
.cj-reveal{height:40px;padding:0 1rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink2);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.76rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.cj-reveal:hover{color:var(--ink);}
.cj-tip{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.8rem 0.9rem;}
.cj-tip-title{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--purple);margin-bottom:0.45rem;}
.cj-rule{font-size:0.75rem;color:var(--ink2);line-height:1.5;margin-bottom:0.25rem;}
.cj-rule span{color:var(--purple);font-family:'SF Mono','Courier New',Courier,monospace;}

/* ═══════════════════════════════════════════
   ⑤ ROLE-PLAY
═══════════════════════════════════════════ */
.sc-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.85rem 0.95rem;cursor:pointer;display:flex;align-items:center;gap:0.85rem;transition:all 0.18s;margin-bottom:0.5rem;}
.sc-card:hover{border-color:var(--warm);}
.sc-icon{font-size:1.5rem;flex-shrink:0;width:44px;text-align:center;}
.sc-name{font-weight:700;font-size:0.87rem;color:var(--ink);margin-bottom:0.1rem;}
.sc-desc{font-size:0.7rem;color:var(--ink3);}
.sc-diff{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:0.18rem;}
.easy{color:var(--green);}
.med{color:var(--warm);}
.hard{color:var(--red);}

.rp-scene-bar{padding:0.55rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border2);flex-shrink:0;}
.rp-sname{font-size:0.72rem;font-weight:700;color:var(--warm);}
.rp-sdesc{font-size:0.63rem;color:var(--ink3);margin-top:0.08rem;}

.chat-msgs{flex:1;overflow-y:auto;padding:0.75rem;display:flex;flex-direction:column;gap:0.65rem;}
.msg{display:flex;flex-direction:column;max-width:86%;}
.msg.native{align-self:flex-start;}
.msg.learner{align-self:flex-end;}
.msg-bubble{padding:0.6rem 0.8rem;border-radius:14px;font-size:0.81rem;line-height:1.55;}
.msg.native .msg-bubble{background:var(--surface);border:1px solid var(--border2);color:var(--ink);border-radius:4px 14px 14px 14px;}
.msg.learner .msg-bubble{background:var(--warm);color:#0e1210;font-weight:500;border-radius:14px 4px 14px 14px;}
.msg-hint{font-size:0.6rem;color:var(--ink3);margin-top:0.18rem;padding:0 0.2rem;}
.msg-fb{font-size:0.67rem;background:var(--green-bg);border:1px solid rgba(0,201,122,0.2);border-radius:8px;padding:0.32rem 0.55rem;margin-top:0.22rem;color:var(--ink2);line-height:1.5;}
.msg-fb .gd{color:var(--green);}
.msg-fb .fix{color:var(--warm);}

.vocab-hint{background:var(--surface2);border-top:1px solid var(--border2);padding:0.5rem 0.9rem;flex-shrink:0;}
.vh-lbl{font-size:0.57rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.28rem;}
.vh-words{display:flex;flex-wrap:wrap;gap:0.28rem;}
.vh-w{padding:0.14rem 0.42rem;border-radius:6px;background:var(--surface);border:1px solid var(--border2);font-size:0.63rem;color:var(--ink3);}
.vh-w span{color:var(--warm);font-weight:600;}

.chat-input-row{display:flex;gap:0.45rem;padding:0.55rem 0.8rem;background:var(--surface);border-top:1px solid var(--border2);flex-shrink:0;align-items:flex-end;}
.chat-inp{flex:1;background:var(--input-bg);border:1px solid var(--border2);border-radius:12px;padding:0.52rem 0.75rem;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.81rem;color:var(--ink);outline:none;resize:none;max-height:80px;transition:border-color 0.15s;line-height:1.45;}
.chat-inp:focus{border-color:var(--warm);}
.chat-inp::placeholder{color:var(--ink3);}
.chat-send{width:36px;height:36px;border-radius:50%;border:none;background:var(--warm);color:#0e1210;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.chat-send:hover{background:var(--warm2);color:#fff;}
.chat-send:disabled{opacity:0.35;cursor:not-allowed;}

/* ═══════════════════════════════════════════
   ⑥ ASSESSMENT
═══════════════════════════════════════════ */
.test-intro{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1rem;margin-bottom:0.8rem;}
.test-intro-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.4rem;letter-spacing:0.03em;color:var(--ink);margin-bottom:0.25rem;}
.test-intro-body{font-size:0.78rem;color:var(--ink2);line-height:1.65;}

.qtc{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.85rem 0.95rem;cursor:pointer;display:flex;align-items:center;gap:0.85rem;transition:all 0.18s;margin-bottom:0.5rem;}
.qtc:hover{border-color:var(--red);}
.qtc-icon{font-size:1.4rem;width:42px;text-align:center;flex-shrink:0;}
.qtc-name{font-weight:700;font-size:0.87rem;color:var(--ink);margin-bottom:0.1rem;}
.qtc-desc{font-size:0.7rem;color:var(--ink3);}
.qtc-count{font-size:0.63rem;color:var(--red);font-weight:600;flex-shrink:0;}

.past-results{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.85rem 1rem;margin-bottom:0.8rem;}
.pr-title{font-size:0.63rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.55rem;}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:0.28rem 0;border-bottom:1px solid var(--border2);}
.pr-row:last-child{border-bottom:none;}
.pr-name{font-size:0.77rem;color:var(--ink2);}
.pr-score{font-size:0.77rem;font-weight:700;}
.pr-score.A,.pr-score.B{color:var(--green);}
.pr-score.C{color:var(--warm);}
.pr-score.D,.pr-score.F{color:var(--red);}

.test-prog-bar{height:3px;background:var(--surface2);flex-shrink:0;}
.test-prog-fill{height:100%;background:var(--red);transition:width 0.4s;}
.test-content{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.6rem;}
.t-q-num{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--red);}
.t-q{font-size:0.97rem;font-weight:700;color:var(--ink);line-height:1.4;}
.t-ctx{font-size:0.71rem;color:var(--ink2);background:var(--surface2);border-radius:8px;padding:0.42rem 0.62rem;border-left:3px solid var(--red);line-height:1.5;}
.t-fill-sent{font-size:1rem;font-weight:600;color:var(--ink);text-align:center;padding:0.75rem 0.4rem;line-height:1.7;}
.t-check{align-self:center;padding:0 1.2rem;height:36px;border-radius:100px;border:none;background:var(--red);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.t-check:hover{background:var(--red2);}
.t-check:disabled{opacity:0.3;cursor:not-allowed;}

.test-nav{padding:0.65rem 0.9rem;background:var(--surface);border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:0.7rem;}
.test-dots{display:flex;gap:0.25rem;align-items:center;flex-wrap:wrap;justify-content:center;flex:1;}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--surface3);transition:all 0.2s;flex-shrink:0;}
.t-dot.ok{background:var(--green);}
.t-dot.bad{background:var(--red);}
.t-dot.cur{background:var(--warm);width:16px;border-radius:3px;}
.tn-next{padding:0 1rem;height:36px;border-radius:100px;border:none;background:var(--red);color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.76rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.tn-next:hover{background:var(--red2);}
.tn-next:disabled{opacity:0.3;cursor:not-allowed;}
.tn-prev{padding:0 0.9rem;height:36px;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--ink3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;font-size:0.73rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.tn-prev:hover{color:var(--ink);}

/* results */
.test-results-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:1.5rem;text-align:center;gap:0.8rem;}
.tr-emoji{font-size:2.5rem;}
.tr-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:2rem;letter-spacing:0.05em;color:var(--ink);}
.tr-ring{width:88px;height:88px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.tr-ring.A,.tr-ring.B{border-color:var(--green);background:var(--green-bg);}
.tr-ring.C{border-color:var(--warm);background:rgba(245,166,35,0.1);}
.tr-ring.D,.tr-ring.F{border-color:var(--red);background:var(--red-bg);}
.tr-grade{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.8rem;line-height:1;}
.tr-ring.A .tr-grade,.tr-ring.B .tr-grade{color:var(--green);}
.tr-ring.C .tr-grade{color:var(--warm);}
.tr-ring.D .tr-grade,.tr-ring.F .tr-grade{color:var(--red);}
.tr-pct{font-size:0.56rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;}
.tr-ring.A .tr-pct,.tr-ring.B .tr-pct{color:var(--green);}
.tr-ring.C .tr-pct{color:var(--warm);}
.tr-ring.D .tr-pct,.tr-ring.F .tr-pct{color:var(--red);}
.tr-sub{font-size:0.8rem;color:var(--ink2);max-width:280px;line-height:1.6;}
.tr-breakdown{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.85rem 1rem;width:100%;max-width:300px;}
.tr-bd-title{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.5rem;}
.tr-bd-row{display:flex;justify-content:space-between;align-items:center;padding:0.25rem 0;}
.tr-bd-row:not(:last-child){border-bottom:1px solid var(--border2);}
.tr-bd-lbl{font-size:0.75rem;color:var(--ink2);}
.tr-bd-val{font-size:0.75rem;font-weight:700;color:var(--ink);}
.tr-btns{display:flex;flex-direction:column;gap:0.5rem;width:100%;max-width:240px;}

/* placement test specific */
.placement-intro{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1.2rem;margin-bottom:0.8rem;}
.pi-title{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.5rem;letter-spacing:0.04em;color:var(--blue);margin-bottom:0.3rem;}
.pi-body{font-size:0.79rem;color:var(--ink2);line-height:1.65;margin-bottom:0.8rem;}
.level-result{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:1rem;margin-top:0.8rem;}
.lr-level{font-family:'Bebas Neue',Impact,'Arial Narrow',sans-serif;font-size:1.8rem;letter-spacing:0.04em;margin-bottom:0.2rem;}
.lr-desc{font-size:0.79rem;color:var(--ink2);line-height:1.6;}
.lr-recs{margin-top:0.6rem;display:flex;flex-direction:column;gap:0.4rem;}
.lr-rec{font-size:0.75rem;color:var(--ink2);display:flex;gap:0.4rem;}
.lr-rec::before{content:'→';color:var(--green);flex-shrink:0;}

/* ═══════════════════ PRACTICE EXERCISES ═══════════════════ */
.prac-home{flex:1;overflow-y:auto;padding:0.9rem;display:flex;flex-direction:column;gap:0.6rem;}
.prac-card{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:1rem;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:0.9rem;}
.prac-card:hover{border-color:var(--green);transform:translateY(-1px);}
.prac-icon{font-size:1.6rem;width:48px;text-align:center;flex-shrink:0;}
.prac-info{flex:1;}
.prac-name{font-weight:700;font-size:0.9rem;color:var(--ink);margin-bottom:0.1rem;}
.prac-desc{font-size:0.72rem;color:var(--ink3);}
.prac-tag{font-size:0.6rem;font-weight:700;color:var(--green);margin-top:0.2rem;}

/* Word Match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;padding:0.9rem;}
.match-btn{background:var(--surface);border:2px solid var(--border2);border-radius:12px;padding:0.65rem 0.5rem;font-family:-apple-system,sans-serif;font-size:0.8rem;font-weight:600;color:var(--ink);cursor:pointer;transition:all 0.2s;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;line-height:1.3;}
.match-btn:hover{border-color:var(--blue);}
.match-btn.selected{border-color:var(--blue);background:rgba(77,166,255,0.15);color:var(--blue);}
.match-btn.matched{border-color:var(--green);background:var(--green-bg);color:var(--green);pointer-events:none;}
.match-btn.wrong{border-color:var(--red);background:var(--red-bg);animation:shake 0.3s ease;}
.match-score{text-align:center;padding:0.5rem;font-weight:700;font-size:0.85rem;color:var(--ink2);}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);};}

/* Sentence Builder */
.sb-english{font-size:1rem;font-weight:700;color:var(--ink);text-align:center;padding:1rem;line-height:1.5;background:var(--surface2);border-radius:12px;margin-bottom:0.7rem;}
.sb-hint{font-size:0.72rem;color:var(--ink3);text-align:center;margin-bottom:0.7rem;}
.sb-answer-zone{min-height:52px;background:var(--surface2);border:2px dashed var(--border2);border-radius:12px;padding:0.6rem;display:flex;flex-wrap:wrap;gap:0.4rem;align-items:center;justify-content:center;margin-bottom:0.7rem;transition:border-color 0.2s;}
.sb-answer-zone.correct-zone{border-color:var(--green);background:var(--green-bg);}
.sb-answer-zone.wrong-zone{border-color:var(--red);background:var(--red-bg);}
.sb-word-pool{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin-bottom:0.7rem;}
.sb-word{background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;padding:0.4rem 0.65rem;font-size:0.82rem;font-weight:600;color:var(--ink2);cursor:pointer;transition:all 0.15s;user-select:none;}
.sb-word:hover{border-color:var(--blue);color:var(--blue);}
.sb-word.placed{background:var(--blue);border-color:var(--blue);color:#fff;}
.sb-word.used{opacity:0.3;pointer-events:none;}
.sb-placed{background:var(--blue);border-color:var(--blue);color:#fff;border-radius:8px;padding:0.4rem 0.65rem;font-size:0.82rem;font-weight:600;cursor:pointer;}
.sb-placed:hover{background:var(--red);border-color:var(--red);}
.sb-feedback{text-align:center;font-size:0.82rem;padding:0.6rem;border-radius:10px;margin-bottom:0.5rem;}
.sb-feedback.ok{background:var(--green-bg);color:var(--green);}
.sb-feedback.bad{background:var(--red-bg);color:var(--red);}

/* Stories */
.story-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:0.9rem;margin-bottom:0.6rem;cursor:pointer;transition:all 0.18s;}
.story-card:hover{border-color:var(--warm);}
.story-level{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;}
.story-title{font-weight:700;font-size:0.9rem;color:var(--ink);margin-bottom:0.2rem;}
.story-preview{font-size:0.72rem;color:var(--ink3);line-height:1.5;}
.story-text{font-size:0.85rem;color:var(--ink2);line-height:1.8;padding:0.8rem;background:var(--surface2);border-radius:12px;margin-bottom:0.8rem;}
.story-text em{color:var(--warm);font-style:normal;font-weight:600;}
.story-q{font-weight:700;font-size:0.88rem;color:var(--ink);margin-bottom:0.5rem;}
.story-opts{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.7rem;}

/* Speed Round */
.speed-card{text-align:center;padding:1.5rem 1rem;}
.speed-word{font-size:2.2rem;font-weight:800;color:var(--ink);margin-bottom:0.3rem;font-family:Impact,'Arial Narrow',sans-serif;letter-spacing:0.02em;}
.speed-timer-bar{height:6px;background:var(--surface2);border-radius:100px;overflow:hidden;margin-bottom:1rem;}
.speed-timer-fill{height:100%;background:var(--green);border-radius:100px;transition:width 0.1s linear;}
.speed-timer-fill.warn{background:var(--warm);}
.speed-timer-fill.danger{background:var(--red);}
.speed-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;}
.speed-opt{background:var(--surface);border:1.5px solid var(--border2);border-radius:12px;padding:0.7rem;font-size:0.82rem;font-weight:600;color:var(--ink);cursor:pointer;transition:all 0.15s;}
.speed-opt:hover{border-color:var(--blue);}
.speed-opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green);}
.speed-opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red);}
.speed-stats{display:flex;justify-content:space-around;padding:0.6rem;}
.spstat{text-align:center;}
.spstat-num{font-size:1.5rem;font-weight:800;}
.spstat-lbl{font-size:0.6rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;}
</style>
</head>
<body>

<script>
'use strict';
// ══════════════════════════════════════════════════════════
//  PERSISTENCE — localStorage save/load
// ══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════
//  PERSISTENCE — URL hash + localStorage (works everywhere)
// ══════════════════════════════════════════════════════════

function encode(obj) {
  try { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); } catch(e) { return ''; }
}
function decode(str) {
  try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch(e) { return null; }
}

function stateToObj() {
  return {
    th:  document.documentElement.getAttribute('data-theme'),
    xp:  ST.xp,
    str: ST.streak,
    ls:  ST.lastStudy,
    sd:  ST.studyDays,
    bt:  [...ST.blocksToday],
    fck: [...ST.fcKnown],
    fcr: [...ST.fcReview],
    grs: ST.grScores,
    ts:  ST.testScores,
    pd:  ST.placementDone,
    pl:  ST.placementLevel,
    fdn: ST.fcDeckName,
    fi:  ST.fcIdx,
  };
}

function applyObj(s) {
  if (!s) return;
  if (s.th) document.documentElement.setAttribute('data-theme', s.th);
  ST.xp            = s.xp  || 0;
  ST.streak        = s.str || 0;
  ST.lastStudy     = s.ls  || null;
  ST.studyDays     = s.sd  || [];
  ST.blocksToday   = new Set(s.bt  || []);
  ST.fcKnown       = new Set(s.fck || []);
  ST.fcReview      = new Set(s.fcr || []);
  ST.grScores      = s.grs || {};
  ST.testScores    = s.ts  || {};
  ST.placementDone = s.pd  || false;
  ST.placementLevel= s.pl  || null;
  ST.fcDeckName    = s.fdn || 'Essentials';
  ST.fcIdx         = s.fi  || 0;
}

function saveState() {
  var obj = stateToObj();
  var enc = encode(obj);
  if (!enc) return;
  // Try localStorage (works on Netlify, GitHub Pages, local file)
  try { localStorage.setItem('espanol_v5', enc); } catch(e) {}
  try { sessionStorage.setItem('espanol_v5', enc); } catch(e) {}
  // Always update URL hash — works everywhere including Claude.site
  try { history.replaceState(null, '', '#s=' + enc); } catch(e) {}
  // Show save reminder after any real activity
  if (ST.xp > 0 || ST.fcKnown.size > 0 || Object.keys(ST.grScores).length > 0) {
    showSaveBar();
  }
}

function loadState() {
  var s = null;
  // 1. Try URL hash first (most reliable)
  try {
    var h = window.location.hash;
    if (h && h.startsWith('#s=')) s = decode(h.slice(3));
  } catch(e) {}
  // 2. Try localStorage
  if (!s) { try { var r = localStorage.getItem('espanol_v5'); if (r) s = decode(r); } catch(e) {} }
  // 3. Try sessionStorage
  if (!s) { try { var r2 = sessionStorage.getItem('espanol_v5'); if (r2) s = decode(r2); } catch(e) {} }
  if (s) applyObj(s);
}

// ── SAVE BAR ─────────────────────────────────────────────
// Appears after activity — tells user to update their bookmark
var _saveBarVisible = false;

function showSaveBar() {
  if (_saveBarVisible) return;
  _saveBarVisible = true;
  var bar = document.getElementById('saveBar');
  if (bar) { bar.style.display = 'flex'; return; }
  bar = document.createElement('div');
  bar.id = 'saveBar';
  bar.style.cssText = [
    'position:fixed','bottom:62px','left:0','right:0','z-index:99999',
    'background:#192118','border-top:2px solid #00d982',
    'padding:0.65rem 1rem','display:flex','align-items:center',
    'gap:0.7rem','font-family:-apple-system,sans-serif',
    'font-size:0.78rem','color:#d4ead9','box-shadow:0 -4px 20px rgba(0,0,0,0.4)'
  ].join(';');
  bar.innerHTML = '<span style="font-size:1.1rem">💾</span>'
    + '<div style="flex:1"><strong style="color:#00d982">Update your bookmark to save progress</strong>'
    + '<div style="font-size:0.68rem;color:#a8c9b0;margin-top:0.1rem">Tap the button → then re-bookmark this page in Safari</div></div>'
    + '<button id="saveBarBtn" style="background:#00d982;color:#0a1a0f;border:none;border-radius:100px;'
    + 'padding:0.4rem 0.9rem;font-weight:700;font-size:0.75rem;cursor:pointer;white-space:nowrap;font-family:-apple-system,sans-serif">'
    + '📌 Save Now</button>'
    + '<button id="saveBarClose" style="background:none;border:none;color:#a8c9b0;font-size:1.1rem;cursor:pointer;padding:0 0.2rem;">✕</button>';
  document.body.appendChild(bar);

  document.getElementById('saveBarBtn').addEventListener('click', function() {
    // Open current URL (with hash) in Safari so user can update bookmark
    var url = window.location.href;
    // Copy to clipboard as fallback
    try { navigator.clipboard.writeText(url); } catch(e) {}
    // Show instructions
    document.getElementById('saveBarBtn').textContent = '✓ URL Updated!';
    document.getElementById('saveBarBtn').style.background = '#a8c9b0';
    setTimeout(function() {
      // Show clear instruction overlay
      var overlay = document.createElement('div');
      overlay.style.cssText = [
        'position:fixed','inset:0','z-index:999999',
        'background:rgba(0,0,0,0.85)','display:flex',
        'flex-direction:column','align-items:center',
        'justify-content:center','padding:2rem','text-align:center',
        'font-family:-apple-system,sans-serif'
      ].join(';');
      overlay.innerHTML = '<div style="background:#192118;border:1px solid #00d982;border-radius:20px;padding:1.5rem;max-width:320px;">'
        + '<div style="font-size:2rem;margin-bottom:0.5rem">📌</div>'
        + '<div style="font-size:1rem;font-weight:700;color:#f0f7f3;margin-bottom:0.5rem">Update your bookmark</div>'
        + '<div style="font-size:0.82rem;color:#a8c9b0;line-height:1.6;margin-bottom:1rem">'
        + '1. Tap the <strong style="color:#f0f7f3">Share button</strong> (box with arrow) at the bottom of Safari<br><br>'
        + '2. Tap <strong style="color:#f0f7f3">Add to Home Screen</strong> or <strong style="color:#f0f7f3">Edit Bookmark</strong><br><br>'
        + '3. Save — your progress is now stored in the URL</div>'
        + '<button id="overlayClose" style="background:#00d982;color:#0a1a0f;border:none;border-radius:100px;'
        + 'padding:0.6rem 1.5rem;font-weight:700;font-size:0.85rem;cursor:pointer;font-family:-apple-system,sans-serif">Got it</button>'
        + '</div>';
      document.body.appendChild(overlay);
      document.getElementById('overlayClose').addEventListener('click', function() {
        overlay.remove();
      });
    }, 500);
  });

  document.getElementById('saveBarClose').addEventListener('click', function() {
    bar.style.display = 'none';
    _saveBarVisible = false;
  });
}

const ST = {
  xp: 0, streak: 0, lastStudy: null,
  studyDays: [],      // ['2026-03-10', '2026-03-11', ...]
  blocksToday: new Set(),
  blocksDoneEver: new Set(),
  fcKnown: new Set(), fcReview: new Set(),
  grScores: {}, testScores: {},
  conjXP: 0, rpDone: 0,
  placementDone: false, placementLevel: null,
  currentView: 'home',
  fcDeckName: 'Essentials', fcIdx: 0,
};

function today() {
  return new Date().toISOString().slice(0,10);
}

function addXP(n) { ST.xp += n; saveState(); }

function markStudiedToday() {
  const t = today();
  if (!ST.studyDays.includes(t)) ST.studyDays.push(t);
  ST.lastStudy = t;
  // streak logic
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.toISOString().slice(0,10);
  if (ST.studyDays.includes(yStr) || ST.studyDays.includes(t)) {
    // recalculate streak
    let streak = 0;
    const check = new Date();
    while (true) {
      const d = check.toISOString().slice(0,10);
      if (ST.studyDays.includes(d)) { streak++; check.setDate(check.getDate()-1); }
      else break;
    }
    ST.streak = streak;
  } else {
    ST.streak = 1;
  }
  saveState();
}

function markBlockDone(name) {
  ST.blocksToday.add(name);
  ST.blocksDoneEver.add(name + '_' + today());
  markStudiedToday();
  addXP(50);
  saveState();
}

function toggleTheme() {
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = next === 'dark' ? '🌙' : '☀️');
  saveState();
}

function applyThemeIcon() {
  const curr = document.documentElement.getAttribute('data-theme');
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = curr === 'dark' ? '🌙' : '☀️');
}

//  NAV
// ══════════════════════════════════════════════════════════
function nav(name) {
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
  var viewId = 'view' + name.charAt(0).toUpperCase() + name.slice(1);
  var el = document.getElementById(viewId);
  if (el) el.classList.add('active');
  var ni = document.getElementById('ni-' + name);
  if (ni) ni.classList.add('active');
  ST.currentView = name;
  if (name === 'home')     buildHome();
  if (name === 'test')     testBuildHome();
  if (name === 'practice') pracBuildHome();
  saveState();
}

function buildHome() {
  markStudiedToday();
  const el = document.getElementById('homeScroll');
  const pct = Math.min(100, Math.round((ST.blocksToday.size / 5) * 100));

  el.innerHTML = `
  ${buildHero()}

  ${buildPhaseBar()}

  ${buildBlock('flash','🃏','bi-g','Flashcard Session','Vocabulary · 500+ cards','15 min','flash')}
  ${buildBlock('grammar','📖','bi-b','Grammar Lesson','Rules, examples & quizzes','20 min','grammar')}
  ${buildBlock('conj','⚡','bi-p','Conjugation Drill','Master verb forms','15 min','conj')}
  ${buildBlock('roleplay','💬','bi-w','Role-Play Chat','Real-life scenarios','10 min','roleplay')}
  ${buildBlock('test','🎯','bi-r','End-of-Block Assessment','Test your progress','5 min','test')}
  <div class="sec-label">Your Progress</div>
  ${buildStatsGrid()}
  <div class="sec-label">Supplemental Resources</div>
  ${buildSupplemental()}
  <div style="height:0.5rem"></div>`;
}

function buildHero() {
  const phase = getPhase();
  return `<div class="hero">
    <div class="hero-eyebrow">Tu camino al español</div>
    <div class="hero-title">APRENDE<br>ESPAÑOL</div>
    <div class="hero-sub">1 hour a day · Beginner → Fluent · Personalized path</div>
    <div class="badge-row">
      <div class="badge badge-streak">🔥 ${ST.streak} day streak</div>
      <div class="badge badge-xp">⚡ ${ST.xp} XP</div>
      <div class="badge badge-phase">${phase.name}</div>
    </div>
  </div>`;
}

function buildStreakAlert() {
  const t = today();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.toISOString().slice(0,10);

  if (ST.streak === 0 || (!ST.studyDays.includes(t) && !ST.studyDays.includes(yStr))) {
    return `<div class="acct-alert danger">
      <div class="aa-icon">🚨</div>
      <div class="aa-body"><div class="aa-title">Streak at risk!</div>
      <div class="aa-sub">You haven't studied recently. Complete at least one block today to keep your momentum. Consistency is everything.</div></div>
    </div>`;
  }
  if (ST.streak >= 7) {
    return `<div class="acct-alert success">
      <div class="aa-icon">🏆</div>
      <div class="aa-body"><div class="aa-title">${ST.streak}-day streak — incredible!</div>
      <div class="aa-sub">You're building a real habit. Research shows 21+ days creates lasting change. Keep going!</div></div>
    </div>`;
  }
  if (ST.blocksToday.size === 0) {
    return `<div class="acct-alert warn">
      <div class="aa-icon">⏰</div>
      <div class="aa-body"><div class="aa-title">Daily goal not started</div>
      <div class="aa-sub">You have a ${ST.streak}-day streak to protect. Start your first block now — even 5 minutes counts.</div></div>
    </div>`;
  }
  return `<div class="acct-alert success">
    <div class="aa-icon">✅</div>
    <div class="aa-body"><div class="aa-title">You studied today — ¡bien hecho!</div>
    <div class="aa-sub">${ST.blocksToday.size}/5 blocks complete. ${ST.blocksToday.size >= 5 ? 'Full session done! 🎉' : 'Keep going to finish your daily goal.'}</div></div>
  </div>`;
}

function buildProgressAlert() {
  const lessonsCompleted = Object.keys(ST.grScores).length;
  const testsAvg = calcTestAvg();
  if (testsAvg >= 85 && lessonsCompleted >= 4) {
    return `<div class="acct-alert info">
      <div class="aa-icon">🚀</div>
      <div class="aa-body"><div class="aa-title">You're ahead of schedule!</div>
      <div class="aa-sub">Your test average is ${testsAvg}% and you've done ${lessonsCompleted} lessons. Take the Placement Test in Assessment to see if you should skip ahead to Phase 2.</div></div>
    </div>`;
  }
  if (testsAvg > 0 && testsAvg < 60) {
    return `<div class="acct-alert warn">
      <div class="aa-icon">📚</div>
      <div class="aa-body"><div class="aa-title">Focus time — scores below target</div>
      <div class="aa-sub">Your average score is ${testsAvg}%. Review the Grammar lessons and Conjugation drills before moving on. Slow down to speed up.</div></div>
    </div>`;
  }
  return '';
}

function calcTestAvg() {
  const scores = Object.values(ST.testScores);
  if (!scores.length) return 0;
  return Math.round(scores.reduce((a,s) => a + s.pct, 0) / scores.length);
}

function buildCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const todayStr = today();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const monthName = now.toLocaleString('default', {month:'long'});

  let cells = '';
  // empty cells
  for (let i = 0; i < firstDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture = dStr > todayStr;
    const isToday  = dStr === todayStr;
    const studied  = ST.studyDays.includes(dStr);
    let cls = 'cal-day';
    if (isFuture)     cls += ' future';
    else if (isToday) cls += ' today';
    else if (studied) cls += ' studied';
    else              cls += ' missed';
    cells += `<div class="${cls}">${d}</div>`;
  }

  return `<div class="streak-calendar">
    <div class="sc-header">
      <div class="sc-title">${monthName} ${year}</div>
      <div class="sc-sub">🟢 studied · 🔵 today · ⬜ missed</div>
    </div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

function buildPhaseBar() {
  const phase = getPhase();
  const done = Object.keys(ST.grScores).length;
  const pct = Math.min(100, Math.round((done / 7) * 100));
  return `<div class="phase-card">
    <div class="phase-header-row">
      <div class="phase-name">📍 ${phase.name}</div>
      <span class="tag tag-blue">${phase.weeks}</span>
    </div>
    <div class="phase-track"><div class="phase-fill" style="width:${pct}%"></div></div>
    <div class="phase-steps">
      <span class="ps ${done>=1?'done':''}">Vocab</span>
      <span class="ps ${done>=2?'done':''}">Grammar</span>
      <span class="ps ${done>=4?'done':''}">Verbs</span>
      <span class="ps ${done>=6?'done':''}">Past Tense</span>
      <span class="ps ${done>=7?'done':''}">Fluency</span>
    </div>
  </div>`;
}

function getPhase() {
  const total = Object.keys(ST.grScores).length + (ST.fcKnown.size / 20);
  if (total < 8)  return {name:'Phase 1 — Foundations', weeks:'Weeks 1–6'};
  if (total < 20) return {name:'Phase 2 — Building',    weeks:'Weeks 7–16'};
  return               {name:'Phase 3 — Fluency Push',  weeks:'Weeks 17+'};
}

function buildBlock(id, icon, iconCls, title, meta, time, navTarget) {
  const done = ST.blocksToday.has(id);
  return `<div class="block-card ${done?'done':''}" onclick="nav('${navTarget}')">
    <div class="block-ico ${iconCls}">${icon}</div>
    <div class="block-info"><div class="block-title">${title}</div><div class="block-meta">${meta}</div></div>
    <div class="block-right"><div class="block-time">${time}</div><div class="block-arrow">${done?'✅':'→'}</div></div>
  </div>`;
}

function buildStatsGrid() {
  const avg = calcTestAvg();
  return `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${ST.fcKnown.size}</div><div class="stat-label">Cards Mastered</div><div class="stat-sub">Keep adding daily</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(ST.grScores).length}/7</div><div class="stat-label">Lessons Done</div><div class="stat-sub">of 7 grammar lessons</div></div>
    <div class="stat-card"><div class="stat-num">${ST.xp}</div><div class="stat-label">Total XP</div><div class="stat-sub">Earned through practice</div></div>
    <div class="stat-card"><div class="stat-num">${avg?avg+'%':'—'}</div><div class="stat-label">Test Average</div><div class="stat-sub">${avg>=85?'Excellent!':avg>=70?'Good — keep going':avg>0?'Review needed':'No tests yet'}</div></div>
  </div>`;
}

function buildSupplemental() {
  const res = [
    ['🎧','Language Transfer','Best free grammar audio course — listen during commutes','Free'],
    ['📺','Dreaming Spanish','YouTube comprehensible input, all levels','Free'],
    ['🎵','Spotify','Bad Bunny / Rosalía / Shakira — lyrics open','Free'],

    ['👤','iTalki','1-on-1 tutors ~$8–12/session, start Phase 2','Paid'],

    ${res.map(([ico,name,desc,cost])=>`<div style="display:flex;align-items:flex-start;gap:0.7rem;">

      <div style="font-size:0.7rem;color:var(--ink3);margin-top:0.08rem">${desc}</div></div>

let grLesson=null, grStep=0, grCorrect=0, grTotal=0, grAnswered=new Set();

function grBuildList() {
  const el = document.getElementById('grListWrap');
  el.innerHTML = '<div style="padding:0.8rem;">';
  let curUnit='';
  LESSONS.forEach((l,i) => {
    if (l.unit !== curUnit) { curUnit=l.unit; el.innerHTML += `<div class="unit-hdr">${l.unit}</div>`; }
    const sc = ST.grScores[l.id];
    el.innerHTML += `<div class="lesson-item ${sc?'done':''}" onclick="grOpenLesson(${i})">
      <div class="li-icon">${l.icon}</div>
      <div class="li-info"><div class="li-title">${l.title}</div><div class="li-desc">${l.desc}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;flex-shrink:0">
        ${sc ? `<div class="li-score">✓ ${sc.c}/${sc.t}</div>` : ''}
        <span class="tag ${l.level==='beginner'?'tag-green':'tag-warm'}">${l.level}</span>
      </div>
    </div>`;
  });
  el.innerHTML += '</div>';
}

function grOpenLesson(idx) {
  grLesson=idx; grStep=0; grCorrect=0; grTotal=0; grAnswered.clear();
  document.getElementById('grListWrap').classList.add('hidden');
  const wrap = document.getElementById('grLessonWrap');
  wrap.classList.remove('hidden');
  wrap.innerHTML = `<div class="gr-prog"><div class="gr-prog-fill" id="grFill"></div></div>
    <div class="gr-content fade-in" id="grContent"></div>
    <div class="gr-nav">
      <button class="gr-prev" id="grPrevBtn" onclick="grPrev()">← Back</button>
      <div class="gr-dots" id="grDots"></div>
      <button class="gr-next" id="grNextBtn" onclick="grNext()">Continue →</button>
    </div>`;
  document.getElementById('grBack').classList.remove('hidden');
  document.getElementById('grHdrTitle').textContent = LESSONS[idx].title;
  grRenderStep();
}

function grGoBack() {
  document.getElementById('grListWrap').classList.remove('hidden');
  document.getElementById('grLessonWrap').classList.add('hidden');
  document.getElementById('grBack').classList.add('hidden');
  document.getElementById('grHdrTitle').textContent = 'Grammar';
  grLesson = null; grBuildList();
}

function grRenderStep() {
  const lesson = LESSONS[grLesson]; const steps = lesson.steps; const step = steps[grStep];
  document.getElementById('grFill').style.width = (grStep/steps.length*100)+'%';
  const dots = document.getElementById('grDots');
  dots.innerHTML = steps.map((_,i)=>`<div class="gr-dot ${i<grStep?'done':i===grStep?'cur':''}"></div>`).join('');
  const nb = document.getElementById('grNextBtn');
  nb.textContent = grStep===steps.length-1 ? 'Finish ✓' : 'Continue →';
  nb.disabled = (step.type==='quiz'||step.type==='fill') && !grAnswered.has(grStep);
  document.getElementById('grPrevBtn').disabled = grStep===0;
  const c = document.getElementById('grContent'); c.innerHTML=''; c.scrollTop=0;
  const d = document.createElement('div'); d.className='fade-in'; d.style.cssText='display:flex;flex-direction:column;gap:0.7rem;';
  d.innerHTML = grBuildStep(step);
  c.appendChild(d);
  if (step.type==='quiz') grAttachQuiz(step);
  if (step.type==='fill') grAttachFill(step);
}

function grBuildStep(s) {
  const tagMap = {explain:'tag-blue',rule:'tag-warm',tip:'tag-purple',quiz:'tag-red',example:'tag-green'};
  let h = `<span class="tag ${tagMap[s.tag]||'tag-blue'}">${s.tag||'lesson'}</span><div class="step-title">${s.title}</div>`;
  if (s.body) h += `<div class="step-body">${s.body.replace(/\n/g,'<br>')}</div>`;
  if (s.table)    h += grTable(s.table);
  if (s.conj)     h += grConj(s.conj);
  if (s.examples) h += grExamples(s.examples);
  if (s.tip)      h += `<div class="tip-box"><div>💡</div><div>${s.tip.text.replace(/\n/g,'<br>')}</div></div>`;
  if (s.warn)     h += `<div class="warn-box"><div>⚠️</div><div>${s.warn.replace(/\n/g,'<br>')}</div></div>`;
  if (s.type==='quiz') h += grBuildQuiz(s);
  if (s.type==='fill') h += grBuildFill(s);
  return h;
}

function grTable(t) {
  const g = t.cw ? t.cw.join(' ') : t.cols.map(()=>'1fr').join(' ');
  let h = `<div class="g-table"><div class="g-thead"><div class="g-tr" style="grid-template-columns:${g}">${t.cols.map(c=>`<div class="g-th">${c}</div>`).join('')}</div></div>`;
  t.rows.forEach(r => { h += `<div class="g-tr" style="grid-template-columns:${g}">${r.map((c,i)=>`<div class="g-td ${i===1?'sp':''}">${c}</div>`).join('')}</div>`; });
  return h + '</div>';
}
function grConj(c) {
  return `<div style="font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.3rem;">${c.verb}</div>
  <div class="conj-grid">${c.forms.map(f=>`<div class="conj-cell ${f.hi?'hi':''}"><div class="conj-pr">${f.pr}</div><div class="conj-fr">${f.f}</div></div>`).join('')}</div>`;
}
function grExamples(items) {
  return '<div class="ex-block">'+items.map(i=>`<div><div class="ex-sp">${i.sp}</div><div class="ex-en">${i.en}</div>${i.note?`<div class="ex-note">→ ${i.note}</div>`:''}</div>`).join('')+'</div>';
}
function grBuildQuiz(s) {
  const letters=['A','B','C','D'];
  return `<div class="quiz-q">${s.question}</div>${s.context?`<div class="quiz-ctx">${s.context}</div>`:''}
  <div style="display:flex;flex-direction:column;gap:0.45rem;" id="grOpts">${s.opts.map((o,i)=>`<button class="q-opt" data-i="${i}" onclick="grCheckQ(${i})"><div class="q-ltr">${letters[i]}</div><div>${o}</div></button>`).join('')}</div>
  <div class="fb-box" id="grFb"></div>`;
}
function grAttachQuiz(s) {
  if (grAnswered.has(grStep)) {
    document.querySelectorAll('#grOpts .q-opt').forEach(o=>{ o.classList.add('dis'); o.disabled=true; });
  }
}
function grCheckQ(sel) {
  if (grAnswered.has(grStep)) return;
  const s = LESSONS[grLesson].steps[grStep]; const ok = sel===s.correct;
  grAnswered.add(grStep); grTotal++; if(ok) grCorrect++;
  document.querySelectorAll('#grOpts .q-opt').forEach((o,i)=>{
    o.classList.add('dis'); o.disabled=true;
    if (i===s.correct) o.classList.add(ok&&i===sel?'correct':'show-c');
    if (i===sel&&!ok) o.classList.add('wrong');
  });
  const fb=document.getElementById('grFb'); fb.className='fb-box show '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'✓ ':'✗ ')+s.exp;
  document.getElementById('grNextBtn').disabled=false;
}
function grBuildFill(s) {
  return `<div class="fill-sent">${s.sentence[0]}<input class="fill-inp" id="grFillInp" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="___">${s.sentence[1]}</div>
  <div class="fill-hint">💡 ${s.hint}</div>
  <button class="check-btn" id="grCheckBtn" onclick="grCheckFill()">Check Answer</button>
  <div class="fb-box" id="grFb2"></div>`;
}
function grAttachFill() {
  const inp=document.getElementById('grFillInp');
  if (inp) inp.addEventListener('keydown', e=>{ if(e.key==='Enter') grCheckFill(); });
}
function grCheckFill() {
  if (grAnswered.has(grStep)) return;
  const s=LESSONS[grLesson].steps[grStep];
  const val=document.getElementById('grFillInp').value.trim().toLowerCase();
  const ok=val===s.answer.toLowerCase();
  grAnswered.add(grStep); grTotal++; if(ok) grCorrect++;
  document.getElementById('grFillInp').classList.add(ok?'ok':'bad');
  document.getElementById('grFillInp').disabled=true;
  document.getElementById('grCheckBtn').disabled=true;
  const fb=document.getElementById('grFb2'); fb.className='fb-box show '+(ok?'ok':'bad');
  fb.innerHTML=(ok?'✓ Correct! ':`✗ Answer: <strong>${s.answer}</strong>. `)+s.exp;
  document.getElementById('grNextBtn').disabled=false;
}
function grPrev() { if(grStep>0){grStep--;grRenderStep();} }
function grNext() {
  const steps=LESSONS[grLesson].steps;
  if (grStep<steps.length-1) { grStep++; grRenderStep(); }
  else grShowComplete();
}
function grShowComplete() {
  ST.grScores[LESSONS[grLesson].id]={c:grCorrect,t:grTotal}; addXP(100); markBlockDone('grammar'); saveState();
  const wrap=document.getElementById('grLessonWrap');
  wrap.innerHTML=`<div class="lesson-complete">
    <div class="lc-emoji">🏆</div>
    <div class="lc-title">${grCorrect===grTotal&&grTotal>0?'¡PERFECTO!':'¡BIEN HECHO!'}</div>
    <div class="score-ring"><div class="sr-num">${grTotal>0?grCorrect+'/'+grTotal:'✓'}</div><div class="sr-lbl">Correct</div></div>
    <div class="lc-sub">${grTotal>0?`${grCorrect} of ${grTotal} quiz questions correct.`:''} Lesson complete! +100 XP</div>
    <div class="lc-btns">
      ${grLesson<LESSONS.length-1?`<button class="btn-primary" onclick="grOpenLesson(${grLesson+1})">Next Lesson →</button>`:''}
      <button class="btn-ghost" onclick="grOpenLesson(${grLesson})">Retry</button>
      <button class="btn-ghost" onclick="grGoBack()">All Lessons</button>
    </div>
  </div>`;
}
